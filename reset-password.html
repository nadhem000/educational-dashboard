<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="auth.resetPasswordTitle">Reset Password – Educational Dashboard</title>
  <link rel="stylesheet" href="ED-general-common.css">
  <style>
    /* Override some modal‑box spacing for the reset page */
    .ED-General-auth-modal-box {
      max-width: 420px;
      margin: auto;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--ED-General-color-bg);
      margin: 0;
    }
    .reset-form input {
      display: block;
      width: 100%;
      margin: 0.8rem 0;
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--ED-General-color-border);
      border-radius: 8px;
      background: var(--ED-General-color-bg);
      color: var(--ED-General-color-text-primary);
      font-family: var(--ED-General-font-stack);
      font-size: 0.9rem;
    }
    .reset-form button {
      width: 100%;
    }
    .message {
      margin-top: 1rem;
      font-size: 0.85rem;
    }
    .message.error { color: #f44336; }
    .message.success { color: var(--ED-General-color-accent-default); }
  </style>
</head>
<body>
  <div class="ED-General-auth-modal-box">
    <h2 class="ED-General-auth-modal-title" data-i18n="auth.setNewPassword">Set new password</h2>
    <p id="token-status" data-i18n="auth.verifyingLink">Verifying your link…</p>

    <form id="reset-form" class="reset-form" style="display: none;">
      <input type="password" id="new-password"
             data-i18n-placeholder="auth.newPasswordPlaceholder"
             placeholder="New password (min. 6 characters)"
             required minlength="6" autocomplete="new-password">
      <button type="submit" class="ED-General-header-btn ED-General-auth-btn-primary"
              data-i18n="auth.updatePassword">Update password</button>
    </form>

    <p id="message" class="message"></p>
  </div>

  <!-- Translation engine (same as your other pages) -->
  <script src="ED-general-translations-data.js"></script>
  <script src="ED-general-translation.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    (function() {
      const SUPABASE_URL = 'https://hmjbzzuresgzwzefjpyt.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhtamJ6enVyZXNnend6ZWZqcHl0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwMjczNDUsImV4cCI6MjA5NTYwMzM0NX0.44Q-Hkl4Rr9LuQhwryrQklFi809xYGteHgsS9nMG0ro';

      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const form = document.getElementById('reset-form');
      const messageEl = document.getElementById('message');
      const tokenStatus = document.getElementById('token-status');
      const passwordInput = document.getElementById('new-password');

      // Get translation function
      const t = window.EDTranslation ? window.EDTranslation.getText.bind(window.EDTranslation) : (k) => k;

      // Init translation with existing dictionary
      if (window.EDTranslation && window.SHARED_UI_TEXT) {
        EDTranslation.init(window.SHARED_UI_TEXT);
        EDTranslation.translatePage();
      }

      // ---------- 1. Verify token ----------
      async function verifyToken() {
        const url = new URL(window.location.href);
        const hash = url.hash.substring(1);
        const params = new URLSearchParams(hash);
        const accessToken = params.get('access_token');
        const type = params.get('type');

        if (!accessToken || type !== 'recovery') {
          tokenStatus.textContent = t('auth.invalidResetLink') || 'This password reset link is invalid or has already been used.';
          tokenStatus.className = 'message error';
          return false;
        }

        try {
          const { error } = await supabase.auth.setSession({
            access_token: accessToken,
            refresh_token: params.get('refresh_token') || '',
          });
          if (error) throw error;

          window.history.replaceState(null, '', window.location.pathname);
          tokenStatus.style.display = 'none';
          form.style.display = 'block';
          return true;
        } catch (err) {
          tokenStatus.textContent = t('auth.expiredLink') || 'This link has expired or is invalid. Please request a new password reset.';
          tokenStatus.className = 'message error';
          return false;
        }
      }

      // ---------- 2. Update password ----------
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        messageEl.textContent = '';
        const newPassword = passwordInput.value.trim();

        if (newPassword.length < 6) {
          messageEl.textContent = t('auth.passwordTooShort') || 'Password must be at least 6 characters.';
          messageEl.className = 'message error';
          return;
        }

        try {
          const { error } = await supabase.auth.updateUser({ password: newPassword });
          if (error) throw error;

          messageEl.textContent = t('auth.passwordUpdated') || 'Password updated successfully! Redirecting to dashboard…';
          messageEl.className = 'message success';
          form.style.display = 'none';

          setTimeout(() => {
            window.location.href = 'https://educational-general-dashboard.netlify.app/';
          }, 2500);

        } catch (err) {
          messageEl.textContent = (t('auth.updateFailed') || 'Could not update password: ') + err.message;
          messageEl.className = 'message error';
        }
      });

      verifyToken();
    })();
  </script>
</body>
</html>
