<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="auth.resetPasswordTitle">Reset Password – Educational Dashboard</title>
  <link rel="stylesheet" href="ED-general-common.css">
  <style>
    /* ---------- Theme variables ---------- */
    :root {
      --ED-General-color-bg: #f5f1eb;
      --ED-General-color-bg-secondary: #ede7df;
      --ED-General-color-surface: #ffffff;
      --ED-General-color-surface-hover: #fafaf8;
      --ED-General-color-text-primary: #1e293b;
      --ED-General-color-text-secondary: #5a6c7d;
      --ED-General-color-text-tertiary: #8b9aab;
      --ED-General-color-border: #e2dcd4;
      --ED-General-color-border-hover: #cbc3b8;
      --ED-General-color-shadow: rgba(60, 50, 40, 0.07);
      --ED-General-color-shadow-hover: rgba(60, 50, 40, 0.14);
      --ED-General-color-accent-default: #4a7fd9;
      --ED-General-color-accent-light: #e8f1fb;
      --ED-General-color-accent-soft: #f0f5fc;
      --ED-General-color-header-bg: #ffffff;
      --ED-General-color-header-border: #e8e2d9;
      --ED-General-color-toggle-bg: #e8e2d9;
      --ED-General-color-toggle-text: #4a5568;
      --ED-General-color-toggle-active-bg: #4a7fd9;
      --ED-General-color-toggle-active-text: #ffffff;
      --ED-General-color-badge-bg: #f0ece5;
      --ED-General-color-badge-text: #5a6c7d;
      --ED-General-color-badge-hover-bg: #e4ded5;
      --ED-General-color-btn-primary-bg: #4a7fd9;
      --ED-General-color-btn-primary-text: #ffffff;
      --ED-General-color-btn-primary-hover: #3b6ec4;
      --ED-General-color-btn-shadow: rgba(0, 0, 0, 0.2);
      --ED-General-color-icon-container-bg: #f0f4f9;
      --ED-General-font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial,
        "Noto Sans", "Noto Sans Arabic", sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
      --ED-General-color-shadow-rgb: 60, 50, 40;
      --ED-General-color-accent-rgb: 74, 127, 217;
      --ED-General-color-icon-sun: #e8a840;
      --ED-General-color-icon-moon: #7b8cb0;
      --ED-General-color-icon-sun-glow: rgba(232, 168, 64, 0.3);
      --ED-General-color-icon-moon-glow: rgba(122, 143, 176, 0.35);
      --ED-General-color-text-on-accent: #ffffff;
    }

    [data-theme="dark"] {
      --ED-General-color-bg: #171a20;
      --ED-General-color-bg-secondary: #1e2129;
      --ED-General-color-surface: #23262f;
      --ED-General-color-surface-hover: #2a2e38;
      --ED-General-color-text-primary: #e2e4ea;
      --ED-General-color-text-secondary: #b0b5c2;
      --ED-General-color-text-tertiary: #7d8494;
      --ED-General-color-border: #32353e;
      --ED-General-color-border-hover: #454952;
      --ED-General-color-shadow: rgba(0, 0, 0, 0.25);
      --ED-General-color-shadow-hover: rgba(0, 0, 0, 0.45);
      --ED-General-color-accent-default: #7aafff;
      --ED-General-color-accent-light: #1e2d45;
      --ED-General-color-accent-soft: #1a2535;
      --ED-General-color-header-bg: #1c1f28;
      --ED-General-color-header-border: #2a2e38;
      --ED-General-color-toggle-bg: #2a2e38;
      --ED-General-color-toggle-text: #b0b5c2;
      --ED-General-color-toggle-active-bg: #7aafff;
      --ED-General-color-toggle-active-text: #12151c;
      --ED-General-color-badge-bg: #2a2e38;
      --ED-General-color-badge-text: #b0b5c2;
      --ED-General-color-badge-hover-bg: #353a45;
      --ED-General-color-btn-primary-bg: #7aafff;
      --ED-General-color-btn-primary-text: #12151c;
      --ED-General-color-btn-primary-hover: #6199f0;
      --ED-General-color-btn-shadow: rgba(0, 0, 0, 0.5);
      --ED-General-color-icon-container-bg: #252b38;
      --ED-General-color-shadow-rgb: 0, 0, 0;
      --ED-General-color-accent-rgb: 122, 175, 255;
      --ED-General-color-icon-sun: #e8a840;
      --ED-General-color-icon-moon: #c4d0f0;
      --ED-General-color-icon-sun-glow: rgba(232, 168, 64, 0.3);
      --ED-General-color-icon-moon-glow: rgba(180, 195, 235, 0.35);
      --ED-General-color-text-on-accent: #12151c;
    }

    [dir="rtl"] { direction: rtl; text-align: right; }

    /* ---------- Page layout ---------- */
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--ED-General-color-bg);
      font-family: var(--ED-General-font-stack);
      color: var(--ED-General-color-text-primary);
      margin: 0;
    }

    .reset-box {
      max-width: 420px;
      width: 90%;
      background: var(--ED-General-color-surface);
      padding: 2rem;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(var(--ED-General-color-shadow-rgb), 0.3);
    }

    /* Password wrapper (eye toggle) */
    .ED-General-password-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      margin: 0.8rem 0;
    }
    .ED-General-password-wrapper input {
      width: 100%;
      padding: 0.5rem 2.5rem 0.5rem 0.75rem;  /* room for the eye button */
      border: 1px solid var(--ED-General-color-border);
      border-radius: 8px;
      background: var(--ED-General-color-bg);
      color: var(--ED-General-color-text-primary);
      font-family: inherit;
      font-size: 0.9rem;
    }
    .ED-General-password-eye {
      position: absolute;
      right: 0.75rem;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.2rem;
      line-height: 1;
      color: var(--ED-General-color-text-secondary);
      padding: 0;
    }
    .ED-General-password-eye:hover {
      color: var(--ED-General-color-accent-default);
    }

    .message { margin-top: 1rem; font-size: 0.85rem; }
    .message.error { color: #f44336; }
    .message.success { color: var(--ED-General-color-accent-default); }

    /* Update button full width */
    .reset-form button {
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="reset-box">
    <h2 data-i18n="auth.setNewPassword">Set new password</h2>
    <p id="token-status" data-i18n="auth.verifyingLink">Verifying your link…</p>

    <form id="reset-form" class="reset-form" style="display: none;">
      <!-- Hidden username field for password manager (avoids browser warning) -->
      <input type="text" name="username" autocomplete="username" style="display:none" aria-hidden="true">

      <div class="ED-General-password-wrapper">
        <input type="password" id="new-password"
               data-i18n-placeholder="auth.newPasswordPlaceholder"
               placeholder="New password (min. 6 characters)"
               required minlength="6" autocomplete="new-password">
        <button type="button" class="ED-General-password-eye"
                onclick="var p=document.getElementById('new-password');p.type=p.type==='password'?'text':'password';this.textContent=p.type==='password'?'👁️':'🙈';"
                title="Show password">👁️</button>
      </div>

      <button type="submit" class="ED-General-header-btn ED-General-auth-btn-primary"
              data-i18n="auth.updatePassword">Update password</button>
    </form>

    <p id="message" class="message"></p>
  </div>

  <!-- Shared translation foundation -->
  <script src="ED-general-translations-data.js"></script>
  <script src="ED-general-translation.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    (function() {
      // ---------- Embedded reset‑page translations ----------
      const RESET_UI_TEXT = {
        en: {
          auth: {
            resetPasswordTitle: 'Reset Password – Educational Dashboard',
            setNewPassword: 'Set new password',
            verifyingLink: 'Verifying your link…',
            newPasswordPlaceholder: 'New password (min. 6 characters)',
            updatePassword: 'Update password',
            invalidResetLink: 'This password reset link is invalid or has already been used.',
            expiredLink: 'This link has expired or is invalid. Please request a new password reset.',
            passwordTooShort: 'Password must be at least 6 characters.',
            passwordUpdated: 'Password updated successfully! Redirecting to dashboard…',
            updateFailed: 'Could not update password: '
          }
        },
        fr: {
          auth: {
            resetPasswordTitle: 'Réinitialiser le mot de passe – Tableau de Bord Éducatif',
            setNewPassword: 'Définir un nouveau mot de passe',
            verifyingLink: 'Vérification de votre lien…',
            newPasswordPlaceholder: 'Nouveau mot de passe (min. 6 caractères)',
            updatePassword: 'Mettre à jour le mot de passe',
            invalidResetLink: 'Ce lien de réinitialisation est invalide ou a déjà été utilisé.',
            expiredLink: 'Ce lien a expiré ou est invalide. Veuillez demander une nouvelle réinitialisation.',
            passwordTooShort: 'Le mot de passe doit comporter au moins 6 caractères.',
            passwordUpdated: 'Mot de passe mis à jour avec succès ! Redirection vers le tableau de bord…',
            updateFailed: 'Échec de la mise à jour du mot de passe : '
          }
        },
        ar: {
          auth: {
            resetPasswordTitle: 'إعادة تعيين كلمة المرور – لوحة التحكم التعليمية',
            setNewPassword: 'تعيين كلمة مرور جديدة',
            verifyingLink: 'جارٍ التحقق من الرابط…',
            newPasswordPlaceholder: 'كلمة المرور الجديدة (6 أحرف على الأقل)',
            updatePassword: 'تحديث كلمة المرور',
            invalidResetLink: 'رابط إعادة التعيين غير صالح أو تم استخدامه بالفعل.',
            expiredLink: 'انتهت صلاحية هذا الرابط أو أنه غير صالح. يرجى طلب إعادة تعيين جديدة.',
            passwordTooShort: 'يجب أن تتكون كلمة المرور من 6 أحرف على الأقل.',
            passwordUpdated: 'تم تحديث كلمة المرور بنجاح! جارٍ التوجيه إلى لوحة التحكم…',
            updateFailed: 'فشل تحديث كلمة المرور: '
          }
        }
      };

      // ---------- Merge translations ----------
      function mergeDeep(target, source) {
        for (const key in source) {
          if (source[key] instanceof Object && key in target) {
            mergeDeep(target[key], source[key]);
          } else {
            target[key] = source[key];
          }
        }
      }

      // Ensure SHARED_UI_TEXT exists, then merge the reset-specific keys
      const shared = window.SHARED_UI_TEXT || { en:{}, fr:{}, ar:{} };
      for (const lang of ['en','fr','ar']) {
        shared[lang] = shared[lang] || {};
        mergeDeep(shared[lang], (RESET_UI_TEXT[lang] || {}));
      }

      // Init translation engine with the merged dictionary
      if (window.EDTranslation) {
        EDTranslation.init(shared);
        EDTranslation.translatePage();
      }

      // Supabase client
      const SUPABASE_URL = 'https://hmjbzzuresgzwzefjpyt.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhtamJ6enVyZXNnend6ZWZqcHl0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwMjczNDUsImV4cCI6MjA5NTYwMzM0NX0.44Q-Hkl4Rr9LuQhwryrQklFi809xYGteHgsS9nMG0ro';
      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const form = document.getElementById('reset-form');
      const messageEl = document.getElementById('message');
      const tokenStatus = document.getElementById('token-status');
      const passwordInput = document.getElementById('new-password');

      const t = window.EDTranslation ? window.EDTranslation.getText.bind(window.EDTranslation) : (k) => k;

      // ---------- Verify token ----------
      async function verifyToken() {
        const url = new URL(window.location.href);
        const hash = url.hash.substring(1);
        const params = new URLSearchParams(hash);
        const accessToken = params.get('access_token');
        const type = params.get('type');

        if (!accessToken || type !== 'recovery') {
          tokenStatus.textContent = t('auth.invalidResetLink');
          tokenStatus.className = 'message error';
          return false;
        }

        try {
          const { error } = await supabase.auth.setSession({
            access_token: accessToken,
            refresh_token: params.get('refresh_token') || '',
          });
          if (error) throw error;

          window.history.replaceState(null, '', window.location.pathname);
          tokenStatus.style.display = 'none';
          form.style.display = 'block';
          return true;
        } catch (err) {
          tokenStatus.textContent = t('auth.expiredLink');
          tokenStatus.className = 'message error';
          return false;
        }
      }

      // ---------- Update password ----------
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        messageEl.textContent = '';
        const newPassword = passwordInput.value.trim();

        if (newPassword.length < 6) {
          messageEl.textContent = t('auth.passwordTooShort');
          messageEl.className = 'message error';
          return;
        }

        try {
          const { error } = await supabase.auth.updateUser({ password: newPassword });
          if (error) throw error;

          messageEl.textContent = t('auth.passwordUpdated');
          messageEl.className = 'message success';
          form.style.display = 'none';

          setTimeout(() => {
            window.location.href = 'https://educational-general-dashboard.netlify.app/';
          }, 2500);

        } catch (err) {
          messageEl.textContent = t('auth.updateFailed') + err.message;
          messageEl.className = 'message error';
        }
      });

      verifyToken();
    })();
  </script>
</body>
</html>
