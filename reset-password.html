<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password – Educational Dashboard</title>
  <!-- Optional: link the common CSS if you want the same theme -->
  <link rel="stylesheet" href="ED-general-common.css">
  <style>
    body {
      font-family: var(--ED-General-font-stack, sans-serif);
      background: var(--ED-General-color-bg, #f5f1eb);
      color: var(--ED-General-color-text-primary, #1e293b);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .reset-box {
      background: var(--ED-General-color-surface, #fff);
      padding: 2rem;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      max-width: 380px;
      width: 90%;
    }
    h2 {
      margin-top: 0;
    }
    input {
      width: 100%;
      padding: 0.5rem;
      margin: 0.8rem 0;
      border: 1px solid var(--ED-General-color-border, #ccc);
      border-radius: 8px;
      font-size: 0.9rem;
    }
    button {
      background: var(--ED-General-color-accent-default, #4a7fd9);
      color: var(--ED-General-color-text-on-accent, #fff);
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
    button:hover {
      filter: brightness(0.9);
    }
    .message {
      margin-top: 1rem;
      font-size: 0.9rem;
    }
    .error {
      color: #f44336;
    }
    .success {
      color: #4caf50;
    }
  </style>
</head>
<body>
  <div class="reset-box">
    <h2>Set new password</h2>
    <form id="reset-form">
      <input type="password" id="new-password" placeholder="New password" required minlength="6">
      <button type="submit">Update password</button>
    </form>
    <p id="message" class="message"></p>
  </div>

  <!-- Only one Supabase script, no ED-general-auth.js -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    (function() {
      const SUPABASE_URL = 'https://hmjbzzuresgzwzefjpyt.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhtamJ6enVyZXNnend6ZWZqcHl0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwMjczNDUsImV4cCI6MjA5NTYwMzM0NX0.44Q-Hkl4Rr9LuQhwryrQklFi809xYGteHgsS9nMG0ro';

      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const form = document.getElementById('reset-form');
      const messageEl = document.getElementById('message');

      // When the user arrives from the reset email, Supabase will fire a PASSWORD_RECOVERY event.
      supabase.auth.onAuthStateChange((event, session) => {
        if (event === 'PASSWORD_RECOVERY') {
          // The user is authenticated with a temporary token, so we can now update the password.
          form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('new-password').value;

            const { error } = await supabase.auth.updateUser({ password: newPassword });

            if (error) {
              messageEl.textContent = error.message;
              messageEl.className = 'message error';
            } else {
              messageEl.textContent = 'Password updated successfully! You can now sign in.';
              messageEl.className = 'message success';
              // Optionally hide the form
              form.style.display = 'none';
            }
          });
        }
      });
    })();
  </script>
</body>
</html>
