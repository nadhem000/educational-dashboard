<!DOCTYPE html>
   <html>
   <head>
     <meta charset="UTF-8">
     <title>Reset Password</title>
     <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
   </head>
   <body>
     <h2>Set new password</h2>
     <form id="reset-form">
       <input type="password" id="new-password" placeholder="New password" required>
       <button type="submit">Update password</button>
     </form>
     <p id="message"></p>
     <script>
       const supabase = window.supabase.createClient(
         'https://hmjbzzuresgzwzefjpyt.supabase.co',
         'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhtamJ6enVyZXNnend6ZWZqcHl0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwMjczNDUsImV4cCI6MjA5NTYwMzM0NX0.44Q-Hkl4Rr9LuQhwryrQklFi809xYGteHgsS9nMG0ro'
       );

       supabase.auth.onAuthStateChange((event, session) => {
         if (event === 'PASSWORD_RECOVERY') {
           document.getElementById('reset-form').addEventListener('submit', async (e) => {
             e.preventDefault();
             const newPassword = document.getElementById('new-password').value;
             const { error } = await supabase.auth.updateUser({ password: newPassword });
             if (error) {
               document.getElementById('message').textContent = error.message;
             } else {
               document.getElementById('message').textContent = 'Password updated! You can now sign in.';
             }
           });
         }
       });
     </script>
   </body>
   </html>
