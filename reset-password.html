<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password – Educational Dashboard</title>
  <link rel="stylesheet" href="ED-general-common.css">
  <style>
    body {
      font-family: var(--ED-General-font-stack, sans-serif);
      background: var(--ED-General-color-bg, #f5f1eb);
      color: var(--ED-General-color-text-primary, #1e293b);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .reset-box {
      background: var(--ED-General-color-surface, #fff);
      padding: 2rem;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      max-width: 400px;
      width: 90%;
    }
    h2 { margin-top: 0; }
    input {
      width: 100%;
      padding: 0.5rem;
      margin: 0.8rem 0;
      border: 1px solid var(--ED-General-color-border, #ccc);
      border-radius: 8px;
      font-size: 0.9rem;
      background: var(--ED-General-color-bg);
      color: var(--ED-General-color-text-primary);
    }
    button {
      background: var(--ED-General-color-accent-default, #4a7fd9);
      color: var(--ED-General-color-text-on-accent, #fff);
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
    button:hover { filter: brightness(0.9); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .message { margin-top: 1rem; font-size: 0.9rem; }
    .error { color: #f44336; }
    .success { color: #4caf50; }
  </style>
</head>
<body>
  <div class="reset-box">
    <h2>Set new password</h2>
    <p id="token-status">Verifying your link…</p>
    <form id="reset-form" style="display: none;">
      <input type="password" id="new-password" placeholder="New password (min. 6 characters)" required minlength="6" autocomplete="new-password">
      <button type="submit">Update password</button>
    </form>
    <p id="message" class="message"></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    (function() {
      const SUPABASE_URL = 'https://hmjbzzuresgzwzefjpyt.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhtamJ6enVyZXNnend6ZWZqcHl0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwMjczNDUsImV4cCI6MjA5NTYwMzM0NX0.44Q-Hkl4Rr9LuQhwryrQklFi809xYGteHgsS9nMG0ro';

      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const form = document.getElementById('reset-form');
      const messageEl = document.getElementById('message');
      const tokenStatus = document.getElementById('token-status');
      const passwordInput = document.getElementById('new-password');

      // ---------- 1. Verify token ----------
      async function verifyToken() {
        const url = new URL(window.location.href);
        const hash = url.hash.substring(1);
        const params = new URLSearchParams(hash);
        const accessToken = params.get('access_token');
        const type = params.get('type');

        if (!accessToken || type !== 'recovery') {
          tokenStatus.textContent = 'This password reset link is invalid or has already been used.';
          tokenStatus.className = 'message error';
          return false;
        }

        try {
          const { error } = await supabase.auth.setSession({
            access_token: accessToken,
            refresh_token: params.get('refresh_token') || '',
          });
          if (error) throw error;

          // Token valid – show the form
          window.history.replaceState(null, '', window.location.pathname);
          tokenStatus.style.display = 'none';
          form.style.display = 'block';
          return true;
        } catch (err) {
          tokenStatus.textContent = 'This link has expired or is invalid. Please request a new password reset.';
          tokenStatus.className = 'message error';
          return false;
        }
      }

      // ---------- 2. Update password ----------
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        messageEl.textContent = '';
        const newPassword = passwordInput.value.trim();

        if (newPassword.length < 6) {
          messageEl.textContent = 'Password must be at least 6 characters.';
          messageEl.className = 'message error';
          return;
        }

        try {
          const { error } = await supabase.auth.updateUser({ password: newPassword });
          if (error) throw error;

          messageEl.textContent = 'Password updated successfully! Redirecting to dashboard…';
          messageEl.className = 'message success';
          form.style.display = 'none';

          setTimeout(() => {
            window.location.href = 'https://educational-general-dashboard.netlify.app/';
          }, 2500);

        } catch (err) {
          // Supabase often returns a 422 with a human-readable message
          messageEl.textContent = 'Could not update password: ' + (err.message || 'Unknown error. Please try again.');
          messageEl.className = 'message error';
        }
      });

      // Start token verification
      verifyToken();
    })();
  </script>
</body>
</html>
