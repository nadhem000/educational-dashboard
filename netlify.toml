[[redirects]]
  from = "/sw.js"
  to = "/sw.js"
  status = 200

[[redirects]]
  from = "/manifest.json"
  to = "/manifest.json"
  status = 200

# Optionally, protect other assets that are fetched directly:
[[redirects]]
  from = "/data_general.js"
  to = "/data_general.js"
  status = 200

[[redirects]]
  from = "/header.html"
  to = "/header.html"
  status = 200

[[redirects]]
  from = "/footer.html"
  to = "/footer.html"
  status = 200

# Now the SPA fallback – only for requests that don’t match any real file
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200