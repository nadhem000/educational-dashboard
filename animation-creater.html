<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Avatar Creator</title>
  <link rel="icon" type="image/x-icon" href="assets/icons/icon-64x64.png">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/ED-general-common.css">
  <style>
    /* Page‑specific styles */
    .step-container {
      max-width: 960px;
      margin: 2rem auto;
      background: var(--ED-General-color-surface);
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 4px 20px rgba(var(--ED-General-color-shadow-rgb), 0.12);
    }
    .step-title {
      margin: 0 0 0.5rem;
      font-size: 1.5rem;
      font-weight: 650;
      color: var(--ED-General-color-text-primary);
    }
    .step-description {
      margin-bottom: 1rem;
      color: var(--ED-General-color-text-secondary);
    }
    .images-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-top: 1rem;
    }
    .image-item {
      position: relative;
      width: 120px;
      height: 120px;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      border: 3px solid transparent;
      transition: border-color 0.2s;
    }
    .image-item.selected {
      border-color: var(--ED-General-color-accent-default);
    }
    .image-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .image-check {
      position: absolute;
      top: 6px;
      left: 6px;
      background: white;
      border-radius: 4px;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
      color: var(--ED-General-color-text-primary);
    }
    .actions {
      margin-top: 2rem;
      display: flex;
      gap: 1rem;
    }
    .btn {
      padding: 0.65rem 1.5rem;
      border-radius: 24px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--ED-General-font-stack);
    }
    .btn-primary {
      background: var(--ED-General-color-accent-default);
      color: var(--ED-General-color-text-on-accent);
    }
    .btn-secondary {
      background: var(--ED-General-color-border);
      color: var(--ED-General-color-text-primary);
    }
    .btn:disabled {
      opacity: 0.5;
      pointer-events: none;
    }
    .empty-message {
      text-align: center;
      color: var(--ED-General-color-text-secondary);
      padding: 2rem;
      display: none;
    }
  </style>
</head>
<body>
  <header id="header-container"></header>

  <main class="ED-General-main">
    <div class="step-container">
      <h2 class="step-title" data-i18n="animation.step1.title">Step 1 – Choose images</h2>
      <p class="step-description" data-i18n="animation.step1.description">Select one or more images for your animated avatar.</p>
      <div id="imagesContainer" class="images-grid"></div>
      <div id="emptyMessage" class="empty-message" data-i18n="animation.step1.noImages">No images found. Please go to your Profile and upload a folder first.</div>
      <div class="actions">
        <button id="nextBtn" class="btn btn-primary" disabled data-i18n="animation.step1.nextBtn">Next →</button>
      </div>
    </div>
  </main>

  <footer id="footer-container"></footer>

  <!-- Shared translation data -->
  <script src="ED-general-translations-data.js"></script>
  <!-- Page‑specific UI text (merged with shared) -->
  <script>
    const PAGE_UI_TEXT = {
      en: {
        animation: {
          step1: {
            title: "Step 1 – Choose images",
            description: "Select one or more images for your animated avatar.",
            noImages: "No images found. Please go to your Profile and upload a folder first.",
            nextBtn: "Next →"
          }
        }
      },
      fr: {
        animation: {
          step1: {
            title: "Étape 1 – Choisissez des images",
            description: "Sélectionnez une ou plusieurs images pour votre avatar animé.",
            noImages: "Aucune image trouvée. Veuillez d'abord importer un dossier depuis votre profil.",
            nextBtn: "Suivant →"
          }
        }
      },
      ar: {
        animation: {
          step1: {
            title: "الخطوة 1 – اختر الصور",
            description: "حدد صورة واحدة أو أكثر لصورتك الرمزية المتحركة.",
            noImages: "لم يتم العثور على صور. يرجى تحميل مجلد من صفحة الملف الشخصي أولاً.",
            nextBtn: "التالي ←"
          }
        }
      }
    };
    // Merge with shared translations
    window.UI_TEXT = {
      en: { ...SHARED_UI_TEXT.en, ...PAGE_UI_TEXT.en },
      fr: { ...SHARED_UI_TEXT.fr, ...PAGE_UI_TEXT.fr },
      ar: { ...SHARED_UI_TEXT.ar, ...PAGE_UI_TEXT.ar }
    };
  </script>
  <!-- Translation engine + shared init (loads header, footer, theme, etc.) -->
  <script src="ED-general-translation.js"></script>
  <script src="ED-general-analytics.js"></script>
  <script src="ED-general-init.js"></script>
  <script src="ED-general-auth.js"></script>
  <script src="ED-general-profile.js"></script>
  <script src="ED-general-encrypted-backup.js"></script>

  <script>
    (function() {
      const DB_NAME = 'ED_ImageFolderCache';
      const STORE_NAME = 'images';
      const imagesContainer = document.getElementById('imagesContainer');
      const emptyMessage = document.getElementById('emptyMessage');
      const nextBtn = document.getElementById('nextBtn');
      
      let selectedImages = new Set();

      function openDB() {
        return new Promise((resolve, reject) => {
          const req = indexedDB.open(DB_NAME, 1);
          req.onupgradeneeded = (e) => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains(STORE_NAME)) {
              db.createObjectStore(STORE_NAME, { keyPath: 'name' });
            }
          };
          req.onsuccess = () => resolve(req.result);
          req.onerror = () => reject(req.error);
        });
      }

      async function loadImages() {
        try {
          const db = await openDB();
          const tx = db.transaction(STORE_NAME, 'readonly');
          const store = tx.objectStore(STORE_NAME);
          const allImages = await new Promise((resolve, reject) => {
            const request = store.getAll();
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
          });

          if (!allImages || allImages.length === 0) {
            emptyMessage.style.display = 'block';
            return;
          }

          renderImages(allImages);
        } catch (err) {
          console.error('Failed to load images:', err);
          emptyMessage.textContent = 'Could not access stored images.';
          emptyMessage.style.display = 'block';
        }
      }

      function renderImages(imageList) {
        imagesContainer.innerHTML = '';
        imageList.forEach(imgObj => {
          const item = document.createElement('div');
          item.className = 'image-item';
          item.dataset.name = imgObj.name;
          item.innerHTML = `
            <img src="${imgObj.data}" alt="${imgObj.name}">
            <div class="image-check">${selectedImages.has(imgObj.name) ? '✓' : ''}</div>
          `;
          item.addEventListener('click', () => toggleImage(imgObj.name, item));
          imagesContainer.appendChild(item);
        });
      }

      function toggleImage(name, element) {
        if (selectedImages.has(name)) {
          selectedImages.delete(name);
          element.classList.remove('selected');
          element.querySelector('.image-check').textContent = '';
        } else {
          selectedImages.add(name);
          element.classList.add('selected');
          element.querySelector('.image-check').textContent = '✓';
        }
        nextBtn.disabled = selectedImages.size === 0;
      }

      nextBtn.addEventListener('click', () => {
        if (selectedImages.size === 0) return;
        // For now, just a placeholder – you can store selection and proceed to step2
        alert(`Selected images: ${Array.from(selectedImages).join(', ')}\n(Step 2 coming soon!)`);
      });

      // Start loading after DOM is ready
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', loadImages);
      } else {
        loadImages();
      }
    })();
  </script>
</body>
</html>
