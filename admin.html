<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Log Monitor</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: monospace;
      background: #0a0a0a;
      color: #ddd;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    #logPanel {
      width: 45%;
      display: flex;
      flex-direction: column;
      border-right: 2px solid #333;
      background: #121212;
    }
    #logHeader {
      padding: 10px;
      background: #1e1e1e;
      font-size: 16px;
      font-weight: bold;
      border-bottom: 1px solid #444;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #logContainer {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      font-size: 12px;
      line-height: 1.4;
      white-space: pre-wrap;
      word-break: break-all;
      background: #0d0d0d;
    }
    .log-entry {
      border-bottom: 1px solid #222;
      padding: 2px 0;
    }
    .btn {
      background: #2a7fd9;
      border: none;
      color: white;
      padding: 4px 10px;
      margin: 0 2px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 12px;
    }
    .btn:hover { background: #1c5fa8; }
    #iframePanel {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    #iframeHeader {
      padding: 10px;
      background: #1e1e1e;
      font-size: 16px;
      font-weight: bold;
      border-bottom: 1px solid #444;
    }
    #mainFrame {
      flex: 1;
      border: none;
      background: #fff;  /* main site background */
    }
  </style>
</head>
<body>
  <!-- LOG PANEL -->
  <div id="logPanel">
    <div id="logHeader">
      <span>📋 Live Logs (max 1000)</span>
      <div>
        <button class="btn" onclick="clearLogs()">🗑 Clear</button>
        <button class="btn" onclick="reloadIframe()">🔄 Reload Site</button>
      </div>
    </div>
    <div id="logContainer"></div>
  </div>

  <!-- MAIN SITE IFRAME -->
  <div id="iframePanel">
    <div id="iframeHeader">🌐 Your Dashboard (live)</div>
    <iframe id="mainFrame" src="/" allow="same-origin"></iframe>
  </div>

  <script>
    const STORAGE_KEY = 'adminLogs';
    const logContainer = document.getElementById('logContainer');
    const iframe = document.getElementById('mainFrame');

    // ======== LOG RENDER ========
    function renderLogs() {
      let logs = [];
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        logs = raw ? JSON.parse(raw) : [];
      } catch (e) { logs = []; }

      logContainer.innerHTML = logs.map(entry => {
        const colorMap = { error: '#ff6666', warn: '#ffaa33', info: '#66aaff' };
        const color = colorMap[entry.level] || '#ccc';
        return `<div class="log-entry"><span style="color:#888">${entry.time}</span> <span style="color:${color}">[${entry.level.toUpperCase()}]</span> ${entry.message}</div>`;
      }).join('');
      logContainer.scrollTop = logContainer.scrollHeight;
    }

    function clearLogs() {
      localStorage.removeItem(STORAGE_KEY);
      renderLogs();
    }

    function reloadIframe() {
      // Re-inject after reload
      iframe.src = iframe.src;
    }

    // Listen for localStorage changes from the iframe
    window.addEventListener('storage', (e) => {
      if (e.key === STORAGE_KEY) renderLogs();
    });

    // ======== INJECT CAPTURE SCRIPT INTO IFRAME ========
    function injectCaptureScript() {
      try {
        const iframeWindow = iframe.contentWindow;
        if (!iframeWindow) return;

        // The script must be a string because we're injecting into a different window context.
        const scriptText = `
          (function() {
            // Prevent double injection
            if (window.__logCaptureInjected) return;
            window.__logCaptureInjected = true;

            const STORAGE_KEY = '${STORAGE_KEY}';

            function saveLogs(logs) {
              try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(logs));
              } catch(e) {}
            }

            let logs = [];
            try {
              const stored = localStorage.getItem(STORAGE_KEY);
              logs = stored ? JSON.parse(stored) : [];
            } catch(e) { logs = []; }

            function addEntry(level, args) {
              const entry = {
                time: new Date().toISOString(),
                level,
                message: args.map(a => {
                  if (a instanceof Error) return a.stack || a.message;
                  if (typeof a === 'object') {
                    try { return JSON.stringify(a, null, 2); } catch(e) { return String(a); }
                  }
                  return String(a);
                }).join(' ')
              };
              logs.push(entry);
              // Keep last 1000 lines
              if (logs.length > 1000) logs = logs.slice(-1000);
              saveLogs(logs);
            }

            // Override console methods
            const original = {};
            ['log','warn','error','info','debug'].forEach(m => {
              original[m] = console[m];
              console[m] = function(...args) {
                original[m].apply(console, args);   // still output to original console
                addEntry(m, args);
              };
            });

            // Capture uncaught errors
            window.addEventListener('error', function(e) {
              addEntry('error', [e.message + ' at ' + e.filename + ':' + e.lineno]);
            });
            window.addEventListener('unhandledrejection', function(e) {
              addEntry('unhandledrejection', [String(e.reason)]);
            });

            console.log('%c✅ Log capture active (injected from admin)', 'color:#0f0');
          })();
        `;

        // Inject script into iframe
        const scriptEl = iframeWindow.document.createElement('script');
        scriptEl.textContent = scriptText;
        iframeWindow.document.head.appendChild(scriptEl);
        console.log('[admin] Capture script injected.');
      } catch (e) {
        console.warn('[admin] Injection failed – maybe not same origin?', e.message);
      }
    }

    // Inject after iframe loads, and after any reload
    iframe.addEventListener('load', () => {
      // Small delay to ensure iframe's DOM is fully ready
      setTimeout(injectCaptureScript, 100);
    });

    // Initial injection attempt (if iframe already loaded)
    if (iframe.contentDocument && iframe.contentDocument.readyState === 'complete') {
      setTimeout(injectCaptureScript, 100);
    }

    // Auto-refresh log display every second (in case storage event fails)
    setInterval(renderLogs, 1000);
    renderLogs();
  </script>
</body>
</html>
