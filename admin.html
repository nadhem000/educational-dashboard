<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Monitor – Full Capture (Cross‑Tab)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0c10;
      font-family: 'Segoe UI', system-ui, monospace;
      color: #e4e6eb;
      padding: 1.5rem;
    }
    .dashboard { max-width: 1600px; margin: 0 auto; }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #2a2e35;
    }
    .title h1 {
      font-size: 1.8rem;
      background: linear-gradient(135deg, #6c8eff, #a67cff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .stat-card {
      background: #15181f;
      border-radius: 1rem;
      padding: 0.8rem 1rem;
      border: 1px solid #2a2e35;
    }
    .stat-label { font-size: 0.7rem; text-transform: uppercase; color: #8e9aaf; }
    .stat-value { font-size: 1.6rem; font-weight: 700; margin-top: 0.2rem; }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      align-items: center;
      background: #111317;
      padding: 0.7rem 1rem;
      border-radius: 2rem;
      margin-bottom: 1.5rem;
    }
    button, .filter-badge {
      background: #1e222b;
      border: none;
      padding: 0.4rem 1rem;
      border-radius: 2rem;
      cursor: pointer;
      color: #e4e6eb;
      font-size: 0.8rem;
    }
    button:hover { background: #2c313c; }
    .btn-primary { background: #4c6ef5; color: white; }
    .btn-primary:hover { background: #5f7bf5; }
    .btn-danger { background: #e03131; }
    .filter-badge.active { background: #4c6ef5; }
    .search-box {
      background: #1e222b;
      border: 1px solid #2a2e35;
      padding: 0.4rem 1rem;
      border-radius: 2rem;
      color: white;
      width: 200px;
    }
    .log-container {
      background: #0e1015;
      border-radius: 1rem;
      border: 1px solid #2a2e35;
      overflow: hidden;
    }
    .log-header {
      display: grid;
      grid-template-columns: 90px 80px 1fr;
      background: #15181f;
      padding: 0.6rem 1rem;
      font-size: 0.7rem;
      font-weight: bold;
      border-bottom: 1px solid #2a2e35;
    }
    .log-entries {
      height: 55vh;
      overflow-y: auto;
      font-family: monospace;
      font-size: 0.75rem;
    }
    .log-entry {
      display: grid;
      grid-template-columns: 90px 80px 1fr;
      padding: 0.4rem 1rem;
      border-bottom: 1px solid #1e222b;
      cursor: pointer;
    }
    .log-entry:hover { background: #1a1e27; }
    .level-error, .level-unhandledrejection { color: #ff6b6b; }
    .level-warn { color: #ffd93d; }
    .level-network { color: #6c8eff; }
    .modal {
      display: none;
      position: fixed;
      top:0;left:0;
      width:100%;height:100%;
      background: rgba(0,0,0,0.8);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-content {
      background: #15181f;
      max-width: 700px;
      width: 90%;
      border-radius: 1rem;
      padding: 1.5rem;
    }
    .modal pre { background: #0e1015; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; }
    .status-badge {
      background: #2a2e35;
      border-radius: 2rem;
      padding: 0.3rem 1rem;
      font-size: 0.7rem;
    }
    .status-active { background: #2b8c4e; }
    .dashboard-link {
      background: #2a2e35;
      padding: 0.4rem 1rem;
      border-radius: 2rem;
      text-decoration: none;
      color: white;
      font-size: 0.8rem;
    }
    .dashboard-link:hover { background: #4c6ef5; }
  </style>
</head>
<body>
<div class="dashboard">
  <div class="header">
    <div class="title"><h1>📡 Admin Monitor (Cross‑Tab)</h1></div>
    <div>
      <a href="/index.html" class="dashboard-link" target="_blank">🚀 Open Dashboard in New Tab</a>
    </div>
  </div>

  <div class="stats" id="statsPanel"></div>

  <div class="controls">
    <button id="startStopBtn" class="btn-primary">▶️ Start Monitoring</button>
    <button id="clearLogsBtn" class="btn-danger">🗑 Clear</button>
    <div class="filter-group" id="levelFilters">
      <span class="filter-badge active" data-level="all">All</span>
      <span class="filter-badge" data-level="error">Errors</span>
      <span class="filter-badge" data-level="warn">Warns</span>
      <span class="filter-badge" data-level="network">Network</span>
      <span class="filter-badge" data-level="log">Console</span>
    </div>
    <input type="text" id="searchInput" class="search-box" placeholder="🔍 Search...">
    <button id="exportJsonBtn">📦 JSON</button>
    <button id="exportCsvBtn">📊 CSV</button>
    <button id="exportTxtBtn">📄 TXT</button>
  </div>

  <div class="log-container">
    <div class="log-header"><div>🕒 Time</div><div>Level</div><div>Message</div></div>
    <div class="log-entries" id="logEntries">⏸ Monitoring inactive. Click Start.</div>
  </div>
</div>

<div id="detailModal" class="modal"><div class="modal-content"><h3>📄 Full log</h3><pre id="modalDetailPre"></pre><button id="closeModalBtn" style="margin-top:1rem;">Close</button></div></div>

<script>
  (function() {
    const STORAGE_KEY = '__admin_logs__';
    const TOKEN_KEY = '__admin_monitor_token__';
    let currentLevel = 'all';
    let currentSearch = '';

    function isActive() { return localStorage.getItem(TOKEN_KEY) === 'active'; }
    function getLogs() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(e) { return []; } }

    function updateUI() {
      const btn = document.getElementById('startStopBtn');
      const active = isActive();
      btn.textContent = active ? '⏸️ Pause Monitoring' : '▶️ Start Monitoring';
      btn.className = active ? 'btn-danger' : 'btn-primary';
    }

    function startMonitoring() {
      localStorage.setItem(TOKEN_KEY, 'active');
      updateUI();
      renderLogs();
      // Optional: reload current page to ensure monitor script sees token immediately? Not needed.
    }
    function pauseMonitoring() {
      localStorage.removeItem(TOKEN_KEY);
      updateUI();
      renderLogs();
    }

    function filterLogs(logs) {
      let filtered = logs;
      if (currentLevel !== 'all') {
        if (currentLevel === 'error')
          filtered = filtered.filter(l => l.level === 'error' || l.level === 'unhandledrejection');
        else
          filtered = filtered.filter(l => l.level === currentLevel);
      }
      if (currentSearch.trim()) {
        const term = currentSearch.trim().toLowerCase();
        filtered = filtered.filter(l => l.message.toLowerCase().includes(term));
      }
      return filtered;
    }

    function updateStats(logs) {
      const total = logs.length;
      const errors = logs.filter(l => l.level === 'error' || l.level === 'unhandledrejection').length;
      const warns = logs.filter(l => l.level === 'warn').length;
      const network = logs.filter(l => l.level === 'network').length;
      const consoleLogs = logs.filter(l => l.level === 'log' || l.level === 'info').length;
      document.getElementById('statsPanel').innerHTML = `
        <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value">${total}</div></div>
        <div class="stat-card"><div class="stat-label">❌ Errors</div><div class="stat-value" style="color:#ff6b6b">${errors}</div></div>
        <div class="stat-card"><div class="stat-label">⚠️ Warnings</div><div class="stat-value" style="color:#ffd93d">${warns}</div></div>
        <div class="stat-card"><div class="stat-label">🌐 Network</div><div class="stat-value" style="color:#6c8eff">${network}</div></div>
        <div class="stat-card"><div class="stat-label">📝 Console</div><div class="stat-value">${consoleLogs}</div></div>
      `;
    }

    function renderLogs() {
      const allLogs = getLogs();
      updateStats(allLogs);
      const filtered = filterLogs(allLogs);
      const container = document.getElementById('logEntries');
      if (filtered.length === 0) {
        container.innerHTML = isActive() ? '<div style="padding:2rem;text-align:center;">No logs match filters.</div>' : '<div style="padding:2rem;text-align:center;">⏸ Monitoring inactive. Click Start, then open your site in a new tab.</div>';
        return;
      }
      container.innerHTML = filtered.map((log, idx) => {
        let levelClass = '';
        if (log.level === 'error' || log.level === 'unhandledrejection') levelClass = 'level-error';
        else if (log.level === 'warn') levelClass = 'level-warn';
        else if (log.level === 'network') levelClass = 'level-network';
        else levelClass = '';
        const timeStr = log.time ? log.time.slice(11,19) : '??';
        let msg = log.message;
        if (log.url) msg += ` ${log.method || ''} ${log.url} (${log.duration}ms)`;
        if (msg.length > 120) msg = msg.slice(0,120)+'…';
        return `<div class="log-entry" data-full='${JSON.stringify(log).replace(/'/g, "&#39;")}'>
          <div class="log-time">${timeStr}</div>
          <div class="${levelClass}">${log.level.toUpperCase()}</div>
          <div>${escapeHtml(msg)}</div>
        </div>`;
      }).join('');
      // attach click handlers
      document.querySelectorAll('.log-entry').forEach(el => {
        el.addEventListener('click', () => {
          const raw = el.getAttribute('data-full');
          if (raw) {
            document.getElementById('modalDetailPre').textContent = JSON.stringify(JSON.parse(raw), null, 2);
            document.getElementById('detailModal').style.display = 'flex';
          }
        });
      });
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m) { return m==='&'?'&amp;': m==='<'?'&lt;':'&gt;'; }); }

    function exportJSON() { download(JSON.stringify(getLogs(),null,2), 'admin_logs.json', 'application/json'); }
    function exportCSV() {
      const logs = getLogs();
      const headers = ['time','level','message','url','method','duration','status','stack'];
      const rows = logs.map(l => [l.time, l.level, l.message, l.url||'', l.method||'', l.duration||'', l.status||'', (l.stack||'').replace(/,/g,';')]);
      const csv = [headers, ...rows].map(row => row.map(c => `"${c}"`).join(',')).join('\n');
      download(csv, 'admin_logs.csv', 'text/csv');
    }
    function exportTXT() {
      const lines = getLogs().map(l => `[${l.time}] [${l.level.toUpperCase()}] ${l.message}${l.url ? ` (${l.method||''} ${l.url}, ${l.duration}ms)` : ''}${l.stack ? '\n'+l.stack : ''}`);
      download(lines.join('\n'), 'admin_logs.txt', 'text/plain');
    }
    function download(content, filename, type) {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([content], {type}));
      a.download = filename;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    document.getElementById('startStopBtn').addEventListener('click', () => isActive() ? pauseMonitoring() : startMonitoring());
    document.getElementById('clearLogsBtn').addEventListener('click', () => { if(confirm('Clear all logs?')) { localStorage.removeItem(STORAGE_KEY); renderLogs(); } });
    document.getElementById('searchInput').addEventListener('input', e => { currentSearch = e.target.value; renderLogs(); });
    document.querySelectorAll('.filter-badge').forEach(b => {
      b.addEventListener('click', () => {
        document.querySelectorAll('.filter-badge').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        currentLevel = b.dataset.level;
        renderLogs();
      });
    });
    document.getElementById('exportJsonBtn').addEventListener('click', exportJSON);
    document.getElementById('exportCsvBtn').addEventListener('click', exportCSV);
    document.getElementById('exportTxtBtn').addEventListener('click', exportTXT);
    document.getElementById('closeModalBtn').addEventListener('click', () => document.getElementById('detailModal').style.display = 'none');
    window.addEventListener('storage', e => { if(e.key === STORAGE_KEY || e.key === TOKEN_KEY) { renderLogs(); updateUI(); } });
    setInterval(renderLogs, 1000);
    updateUI();
    renderLogs();
  })();
</script>
</body>
</html>
