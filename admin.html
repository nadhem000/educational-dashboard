<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Monitor</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Segoe UI', system-ui, monospace;
      background: #0a0a0a;
      color: #ccc;
      display: flex;
      height: 100vh;
    }
    .sidebar {
      width: 200px;
      background: #141414;
      padding: 15px;
      border-right: 1px solid #333;
    }
    .sidebar h2 { margin-top: 0; font-size: 18px; color: #fff; }
    .filter-btn {
      display: block;
      width: 100%;
      padding: 6px;
      margin: 4px 0;
      background: #1e1e1e;
      border: none;
      color: #ddd;
      cursor: pointer;
      text-align: left;
      border-radius: 3px;
    }
    .filter-btn.active { background: #2a7fd9; color: #fff; }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .toolbar {
      padding: 10px;
      background: #1e1e1e;
      border-bottom: 1px solid #333;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .log-container {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      font-size: 13px;
      line-height: 1.5;
      background: #0d0d0d;
    }
    .log-entry {
      border-bottom: 1px solid #1a1a1a;
      padding: 3px 5px;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .log-time { color: #888; margin-right: 8px; }
    .level-error, .level-unhandledrejection { color: #ff5555; }
    .level-warn { color: #ffaa33; }
    .level-network { color: #66aaff; }
    .btn {
      background: #2a7fd9;
      border: none;
      color: white;
      padding: 5px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    .btn:hover { background: #1c5fa8; }
    .btn.start { background: #2a7fd9; }
    .btn.start:hover { background: #1c5fa8; }
    .btn.pause { background: #d94a2a; }
    .btn.pause:hover { background: #a8381f; }
    .status { font-size: 12px; color: #aaa; margin-left: auto; }
    .inactive-message {
      text-align: center;
      padding: 2rem;
      color: #ffaa33;
      background: #1e1e1e;
      border-radius: 8px;
      margin: 1rem;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>Filters</h2>
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="error">Errors</button>
    <button class="filter-btn" data-filter="warn">Warnings</button>
    <button class="filter-btn" data-filter="network">Network</button>
    <button class="filter-btn" data-filter="log">Console</button>
  </div>
  <div class="main">
    <div class="toolbar">
      <button class="btn start" id="toggleMonitorBtn">▶️ Start Monitoring</button>
      <button class="btn" onclick="clearLogs()">🗑 Clear</button>
      <button class="btn" onclick="showAsText()">📄 Show as TXT</button>
      <button class="btn" onclick="exportJSON()">📥 Export JSON</button>
      <span class="status" id="status">🔴 Monitoring inactive</span>
    </div>
    <div class="log-container" id="logContainer">
      <div class="inactive-message">
        ⏸️ Monitoring is off.<br>
        Click <strong>Start Monitoring</strong> to begin capturing logs.
      </div>
    </div>
  </div>
  <script>
    const STORAGE_KEY = '__admin_logs__';
    const TOKEN_KEY = '__admin_monitor_token__';
    const MONITOR_SCRIPT_URL = '/ED-admin-monitor.js';  // adjust path if needed

    let currentFilter = 'all';
    let monitorLoaded = false;

    function isMonitoringActive() {
      return sessionStorage.getItem(TOKEN_KEY) === 'active';
    }

    function updateUI() {
      const active = isMonitoringActive();
      const btn = document.getElementById('toggleMonitorBtn');
      const statusSpan = document.getElementById('status');
      if (active) {
        btn.textContent = '⏸️ Pause Monitoring';
        btn.className = 'btn pause';
        statusSpan.textContent = '🟢 Monitoring active (capturing events)';
        statusSpan.style.color = '#4f4';
      } else {
        btn.textContent = '▶️ Start Monitoring';
        btn.className = 'btn start';
        statusSpan.textContent = '🔴 Monitoring inactive';
        statusSpan.style.color = '#f44';
      }
    }

    // Load the monitor script dynamically (only once)
    function loadMonitorScript() {
      if (monitorLoaded) return Promise.resolve();
      return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = MONITOR_SCRIPT_URL;
        script.onload = () => {
          monitorLoaded = true;
          resolve();
        };
        script.onerror = () => reject(new Error('Failed to load monitor script'));
        document.head.appendChild(script);
      });
    }

    // Start monitoring: set token, load script, refresh display
    async function startMonitoring() {
      sessionStorage.setItem(TOKEN_KEY, 'active');
      await loadMonitorScript();
      updateUI();
      render();      // show existing logs (if any)
      // Remove the placeholder message if present
      const msg = document.querySelector('.inactive-message');
      if (msg) msg.remove();
    }

    function pauseMonitoring() {
      sessionStorage.removeItem(TOKEN_KEY);
      updateUI();
      render();      // logs still visible but no new captures
      if (getLogs().length === 0) {
        showInactiveMessage();
      }
    }

    function toggleMonitoring() {
      if (isMonitoringActive()) {
        pauseMonitoring();
      } else {
        startMonitoring();
      }
    }

    function getLogs() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      } catch (_) { return []; }
    }

    function render() {
      const logs = getLogs();
      if (!isMonitoringActive() && logs.length === 0) {
        showInactiveMessage();
        return;
      }
      const filtered = currentFilter === 'all'
        ? logs
        : logs.filter(l => l.level === currentFilter || (currentFilter === 'error' && l.level === 'unhandledrejection'));
      if (filtered.length === 0 && logs.length > 0) {
        container.innerHTML = `<div class="inactive-message" style="background:transparent; color:#888;">No logs match the selected filter.</div>`;
        return;
      }
      const container = document.getElementById('logContainer');
      container.innerHTML = filtered.map(l => {
        const colorClass = 'level-' + l.level;
        let extra = '';
        if (l.url) extra = ` ${l.method || ''} ${l.url} (${l.duration}ms)`;
        return `<div class="log-entry">
          <span class="log-time">${l.time.slice(11, 19)}</span>
          <span class="${colorClass}">[${l.level.toUpperCase()}]</span>
          ${escapeHtml(l.message)}${extra}
          ${l.stack ? '\n' + escapeHtml(l.stack) : ''}
        </div>`;
      }).join('');
      container.scrollTop = container.scrollHeight;
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    function showInactiveMessage() {
      const container = document.getElementById('logContainer');
      container.innerHTML = `<div class="inactive-message">
        ⏸️ Monitoring is off.<br>
        Click <strong>Start Monitoring</strong> to begin capturing logs.
      </div>`;
    }

    window.clearLogs = () => {
      localStorage.removeItem(STORAGE_KEY);
      render();
      if (!isMonitoringActive()) showInactiveMessage();
    };

    window.exportJSON = () => {
      const logs = getLogs();
      const blob = new Blob([JSON.stringify(logs, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'admin-logs.json';
      a.click();
    };

    window.showAsText = () => {
      const logs = getLogs();
      const text = logs.map(l => {
        let line = `[${l.time}] [${l.level.toUpperCase()}] ${l.message}`;
        if (l.url) line += ` (${l.method || ''} ${l.url}, ${l.duration}ms)`;
        if (l.stack) line += '\n' + l.stack;
        return line;
      }).join('\n');
      const blob = new Blob([text], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      window.open(url, '_blank');
    };

    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        render();
      });
    });

    // Listen for storage changes (if logs updated in another tab)
    window.addEventListener('storage', e => {
      if (e.key === STORAGE_KEY) render();
    });

    // Auto-refresh display every second
    setInterval(render, 1000);

    // Event binding
    document.getElementById('toggleMonitorBtn').addEventListener('click', toggleMonitoring);

    // Initial UI
    updateUI();
    render();
  </script>
</body>
</html>
