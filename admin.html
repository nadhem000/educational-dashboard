<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Log Monitor</title>
  <style>
    body {
      font-family: monospace;
      background: #111;
      color: #eee;
      margin: 0;
      padding: 10px;
    }
    #logContainer {
      white-space: pre-wrap;
      word-break: break-all;
      background: #1e1e1e;
      height: 75vh;
      overflow-y: auto;
      padding: 10px;
      border: 1px solid #444;
      margin-bottom: 10px;
    }
    .log-entry {
      border-bottom: 1px solid #333;
      padding: 2px 0;
    }
    .btn {
      padding: 6px 12px;
      margin: 4px;
      cursor: pointer;
      background: #2a7fd9;
      color: white;
      border: none;
      border-radius: 4px;
    }
    textarea {
      width: 100%;
      height: 100px;
      background: #1e1e1e;
      color: #0f0;
      border: 1px solid #555;
      font-family: monospace;
      resize: vertical;
    }
  </style>
</head>
<body>
  <h2>📋 Admin Log Monitor</h2>
  <p>Open this page in a <strong>separate tab</strong>, then run the injector script in your main site’s console.</p>
  
  <div>
    <button class="btn" onclick="refreshLogs()">🔄 Refresh Now</button>
    <button class="btn" onclick="clearLogs()">🗑 Clear All Logs</button>
    <button class="btn" onclick="copyScript()">📋 Copy Injector Script</button>
  </div>
  
  <div id="logContainer"></div>
  
  <h3>📝 Injector Script (paste into target page console)</h3>
  <textarea id="scriptArea" readonly>
// Copy this and run it in the main site's console ONCE.
// All console messages + errors will be sent here.

(function() {
  const STORAGE_KEY = 'adminLogs';

  function saveLogs(logs) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(logs));
    } catch(e) {}
  }

  let logs = [];
  try {
    const stored = localStorage.getItem(STORAGE_KEY);
    logs = stored ? JSON.parse(stored) : [];
  } catch(e) { logs = []; }

  function addEntry(level, args) {
    const entry = {
      time: new Date().toISOString(),
      level,
      message: args.map(a => {
        if (a instanceof Error) return a.stack || a.message;
        if (typeof a === 'object') {
          try { return JSON.stringify(a, null, 2); } catch(e) { return String(a); }
        }
        return String(a);
      }).join(' ')
    };
    logs.push(entry);
    // Keep last 1000 lines max to avoid storage bloat
    if (logs.length > 1000) logs = logs.slice(-1000);
    saveLogs(logs);
  }

  const original = {};
  ['log','warn','error','info','debug'].forEach(m => {
    original[m] = console[m];
    console[m] = function(...args) {
      original[m].apply(console, args);
      addEntry(m, args);
    };
  });

  window.addEventListener('error', e => {
    addEntry('error', [`${e.message} at ${e.filename}:${e.lineno}`]);
  });
  window.addEventListener('unhandledrejection', e => {
    addEntry('unhandledrejection', [String(e.reason)]);
  });

  console.log('%c✅ Log injector active – see /admin tab', 'color:#0f0');
})();
  </textarea>
  
  <script>
    const STORAGE_KEY = 'adminLogs';
    const container = document.getElementById('logContainer');

    function renderLogs() {
      let logs = [];
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        logs = raw ? JSON.parse(raw) : [];
      } catch(e) { logs = []; }

      container.innerHTML = logs.map(entry => {
        const colorMap = { error: '#f66', warn: '#ff6', info: '#6cf' };
        const color = colorMap[entry.level] || '#ddd';
        return `<div class="log-entry"><span style="color:#888">${entry.time}</span> <span style="color:${color}">[${entry.level.toUpperCase()}]</span> ${entry.message}</div>`;
      }).join('');
      container.scrollTop = container.scrollHeight;
    }

    function refreshLogs() {
      renderLogs();
    }

    function clearLogs() {
      localStorage.removeItem(STORAGE_KEY);
      renderLogs();
    }

    function copyScript() {
      const ta = document.getElementById('scriptArea');
      ta.select();
      document.execCommand('copy');
      alert('Script copied! Now paste it into the main site’s console.');
    }

    // Listen for log changes from other tabs (main site)
    window.addEventListener('storage', (e) => {
      if (e.key === STORAGE_KEY) {
        renderLogs();
      }
    });

    // Initial render
    renderLogs();

    // Auto-refresh every 2 seconds as fallback
    setInterval(renderLogs, 2000);
  </script>
</body>
</html>
