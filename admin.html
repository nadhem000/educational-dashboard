<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Monitor</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Segoe UI', system-ui, monospace;
      background: #0a0a0a;
      color: #ccc;
      display: flex;
      height: 100vh;
    }
    .sidebar {
      width: 200px;
      background: #141414;
      padding: 15px;
      border-right: 1px solid #333;
    }
    .sidebar h2 { margin-top: 0; font-size: 18px; color: #fff; }
    .filter-btn {
      display: block;
      width: 100%;
      padding: 6px;
      margin: 4px 0;
      background: #1e1e1e;
      border: none;
      color: #ddd;
      cursor: pointer;
      text-align: left;
      border-radius: 3px;
    }
    .filter-btn.active { background: #2a7fd9; color: #fff; }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .toolbar {
      padding: 10px;
      background: #1e1e1e;
      border-bottom: 1px solid #333;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .log-container {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      font-size: 13px;
      line-height: 1.5;
      background: #0d0d0d;
    }
    .log-entry {
      border-bottom: 1px solid #1a1a1a;
      padding: 3px 5px;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .log-time { color: #888; margin-right: 8px; }
    .level-error, .level-unhandledrejection { color: #ff5555; }
    .level-warn { color: #ffaa33; }
    .level-network { color: #66aaff; }
    .btn {
      background: #2a7fd9;
      border: none;
      color: white;
      padding: 5px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    .btn:hover { background: #1c5fa8; }
    .btn.pause { background: #d94a2a; }
    .btn.pause:hover { background: #a8381f; }
    .status { font-size: 12px; color: #aaa; margin-left: auto; }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>Filters</h2>
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="error">Errors</button>
    <button class="filter-btn" data-filter="warn">Warnings</button>
    <button class="filter-btn" data-filter="network">Network</button>
    <button class="filter-btn" data-filter="log">Console</button>
  </div>
  <div class="main">
    <div class="toolbar">
      <button class="btn" id="pauseBtn" onclick="togglePause()">⏸️ Pause</button>
      <button class="btn" onclick="clearLogs()">🗑 Clear</button>
      <button class="btn" onclick="showAsText()">📄 Show as TXT</button>
      <button class="btn" onclick="exportJSON()">📥 Export JSON</button>
      <span class="status" id="status">🟢 Monitoring active</span>
    </div>
    <div class="log-container" id="logContainer"></div>
  </div>

  <script>
    const STORAGE_KEY = '__admin_logs__';
    const PAUSE_KEY = '__monitor_paused__';
    const container = document.getElementById('logContainer');
    const statusEl = document.getElementById('status');
    const pauseBtn = document.getElementById('pauseBtn');
    let currentFilter = 'all';

    function isPaused() {
      return localStorage.getItem(PAUSE_KEY) === 'true';
    }

    function updatePauseUI() {
      const paused = isPaused();
      pauseBtn.textContent = paused ? '▶️ Resume' : '⏸️ Pause';
      pauseBtn.className = paused ? 'btn' : 'btn pause';
      statusEl.textContent = paused ? '🔴 Monitoring paused' : '🟢 Monitoring active';
      statusEl.style.color = paused ? '#f44' : '#4f4';
    }

    window.togglePause = function() {
      const paused = isPaused();
      if (paused) {
        localStorage.removeItem(PAUSE_KEY);
      } else {
        localStorage.setItem(PAUSE_KEY, 'true');
      }
      updatePauseUI();
      // Notify other tabs (they will re-render and check pause flag)
      window.dispatchEvent(new Event('storage'));
    };

    function getLogs() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      } catch (_) { return []; }
    }

    function render() {
      const logs = getLogs();
      const filtered = currentFilter === 'all'
        ? logs
        : logs.filter(l => l.level === currentFilter || (currentFilter === 'error' && l.level === 'unhandledrejection'));
      
      container.innerHTML = filtered.map(l => {
        const colorClass = 'level-' + l.level;
        let extra = '';
        if (l.url) extra = ` ${l.method || ''} ${l.url} (${l.duration}ms)`;
        return `<div class="log-entry">
          <span class="log-time">${l.time.slice(11, 19)}</span>
          <span class="${colorClass}">[${l.level.toUpperCase()}]</span>
          ${l.message}${extra}
          ${l.stack ? '\n' + l.stack : ''}
        </div>`;
      }).join('');
      container.scrollTop = container.scrollHeight;
    }

    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        render();
      });
    });

    window.clearLogs = () => {
      localStorage.removeItem(STORAGE_KEY);
      render();
    };

    window.exportJSON = () => {
      const logs = getLogs();
      const blob = new Blob([JSON.stringify(logs, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'admin-logs.json';
      a.click();
    };

    window.showAsText = () => {
      const logs = getLogs();
      const text = logs.map(l => {
        let line = `[${l.time}] [${l.level.toUpperCase()}] ${l.message}`;
        if (l.url) line += ` (${l.method || ''} ${l.url}, ${l.duration}ms)`;
        if (l.stack) line += '\n' + l.stack;
        return line;
      }).join('\n');
      const blob = new Blob([text], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      window.open(url, '_blank');
    };

    // Sync across tabs
    window.addEventListener('storage', e => {
      if (e.key === STORAGE_KEY || e.key === PAUSE_KEY) {
        render();
        updatePauseUI();
      }
    });

    // Periodic refresh
    setInterval(() => { render(); updatePauseUI(); }, 1000);
    updatePauseUI();
    render();
  </script>
</body>
</html>
