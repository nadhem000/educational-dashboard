<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Educational Dashboard</title>
    <style>
        /* ===== COMPLETE VARIABLE SET (same as terms/privacy) ===== */
        :root {
            --ED-General-color-bg: #f5f1eb;
            --ED-General-color-bg-secondary: #ede7df;
            --ED-General-color-surface: #ffffff;
            --ED-General-color-surface-hover: #fafaf8;
            --ED-General-color-text-primary: #1e293b;
            --ED-General-color-text-secondary: #5a6c7d;
            --ED-General-color-text-tertiary: #8b9aab;
            --ED-General-color-border: #e2dcd4;
            --ED-General-color-border-hover: #cbc3b8;
            --ED-General-color-shadow: rgba(60, 50, 40, 0.07);
            --ED-General-color-accent-default: #4a7fd9;
            --ED-General-color-accent-light: #e8f1fb;
            --ED-General-color-accent-soft: #f0f5fc;
            --ED-General-color-header-bg: #ffffff;
            --ED-General-color-header-border: #e8e2d9;
            --ED-General-color-header-bg-start: #fefdfb;
            --ED-General-color-header-bg-mid1: #faf8f4;
            --ED-General-color-header-bg-mid2: #f6f3ee;
            --ED-General-color-header-bg-end: #f2efe8;
            --ED-General-color-header-accent-line: rgba(180,160,140,0.5);
            --ED-General-color-icon-sun: #e8a840;
            --ED-General-color-icon-sun-glow: rgba(232,168,64,0.3);
            --ED-General-color-icon-moon: #7b8cb0;
            --ED-General-color-icon-moon-glow: rgba(180,195,235,0.0);
            --ED-General-color-toggle-bg: #e8e2d9;
            --ED-General-color-toggle-text: #4a5568;
            --ED-General-color-toggle-active-bg: #4a7fd9;
            --ED-General-color-toggle-active-text: #ffffff;
            --ED-General-color-badge-bg: #f0ece5;
            --ED-General-color-badge-text: #5a6c7d;
            --ED-General-color-btn-primary-bg: #4a7fd9;
            --ED-General-color-btn-primary-text: #ffffff;
            --ED-General-color-btn-primary-hover: #3b6ec4;
            --ED-General-color-btn-shadow: rgba(0, 0, 0, 0.2);
            --ED-General-color-icon-container-bg: #f0f4f9;
            --ED-General-card-radius: 16px;
            --ED-General-card-padding: 1.5rem;
            --ED-General-transition-speed: 0.3s;
            --ED-General-font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "Noto Sans Arabic", sans-serif;
            --ED-General-select-arrow-color: #5a6c7d;
            --ED-General-select-wrapper-bg: var(--ED-General-color-surface);
        }
        [data-theme="dark"] {
            --ED-General-color-bg: #171a20;
            --ED-General-color-bg-secondary: #1e2129;
            --ED-General-color-surface: #23262f;
            --ED-General-color-surface-hover: #2a2e38;
            --ED-General-color-text-primary: #e2e4ea;
            --ED-General-color-text-secondary: #b0b5c2;
            --ED-General-color-text-tertiary: #7d8494;
            --ED-General-color-border: #32353e;
            --ED-General-color-border-hover: #454952;
            --ED-General-color-shadow: rgba(0, 0, 0, 0.25);
            --ED-General-color-accent-default: #7aafff;
            --ED-General-color-accent-light: #1e2d45;
            --ED-General-color-accent-soft: #1a2535;
            --ED-General-color-header-bg: #1c1f28;
            --ED-General-color-header-border: #2a2e38;
            --ED-General-color-header-bg-start: #1f222d;
            --ED-General-color-header-bg-mid1: #1c1f29;
            --ED-General-color-header-bg-mid2: #191c24;
            --ED-General-color-header-bg-end: #171a20;
            --ED-General-color-header-accent-line: rgba(60,50,40,0.0);
            --ED-General-color-icon-sun: #e8a840;
            --ED-General-color-icon-sun-glow: rgba(232,168,64,0.0);
            --ED-General-color-icon-moon: #c4d0f0;
            --ED-General-color-icon-moon-glow: rgba(180,195,235,0.35);
            --ED-General-color-toggle-bg: #2a2e38;
            --ED-General-color-toggle-text: #b0b5c2;
            --ED-General-color-toggle-active-bg: #7aafff;
            --ED-General-color-toggle-active-text: #12151c;
            --ED-General-color-badge-bg: #2a2e38;
            --ED-General-color-badge-text: #b0b5c2;
            --ED-General-color-btn-primary-bg: #7aafff;
            --ED-General-color-btn-primary-text: #12151c;
            --ED-General-color-btn-primary-hover: #6199f0;
            --ED-General-color-btn-shadow: rgba(0, 0, 0, 0.5);
            --ED-General-color-icon-container-bg: #252b38;
            --ED-General-select-arrow-color: #b0b5c2;
            --ED-General-select-wrapper-bg: var(--ED-General-color-surface);
        }
        [dir="rtl"] { direction: rtl; text-align: right; }
        [dir="rtl"] .ED-General-header__controls { flex-direction: row-reverse; }
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html { font-size: 16px; scroll-behavior: smooth; }
        body {
            font-family: var(--ED-General-font-stack);
            background-color: var(--ED-General-color-bg);
            color: var(--ED-General-color-text-primary);
            min-height: 100vh;
            transition: background-color var(--ED-General-transition-speed) ease, color var(--ED-General-transition-speed) ease;
            line-height: 1.65;
            -webkit-font-smoothing: antialiased;
        }
        .ED-General-header {
            background: linear-gradient(175deg, var(--ED-General-color-header-bg-start) 0%, var(--ED-General-color-header-bg-mid1) 25%, var(--ED-General-color-header-bg-mid2) 60%, var(--ED-General-color-header-bg-end) 100%);
            border-bottom: 1px solid var(--ED-General-color-header-border);
            padding: 1.05rem 1.75rem;
            position: sticky;
            top: 0;
            z-index: 100;
            transition: background var(--ED-General-transition-speed) ease, border-color var(--ED-General-transition-speed) ease, box-shadow var(--ED-General-transition-speed) ease;
            box-shadow: 0 1px 4px var(--ED-General-color-shadow), 0 2px 10px var(--ED-General-color-shadow);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
        }
        .ED-General-header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(105deg, var(--ED-General-color-accent-default) 0%, var(--ED-General-color-accent-default) 35%, var(--ED-General-color-header-accent-line) 60%, transparent 85%);
            opacity: 0.75;
            border-radius: 0 0 1px 0;
            transition: opacity 0.3s ease;
        }
        .ED-General-header:hover::before { opacity: 0.95; }
        .ED-General-header__inner {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.85rem;
            position: relative;
            z-index: 1;
        }
        .ED-General-header__title {
            font-size: 1.38rem;
            font-weight: 750;
            letter-spacing: -0.025em;
            color: var(--ED-General-color-text-primary);
            white-space: nowrap;
            transition: color var(--ED-General-transition-speed) ease;
            display: flex;
            align-items: center;
            gap: 0.45rem;
        }
        .ED-General-header__title-icon {
            width: 26px;
            height: 26px;
            object-fit: contain;
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(0 1px 2px rgba(0,0,0,0.08));
        }
        .ED-General-header__title:hover .ED-General-header__title-icon { transform: rotate(-5deg) scale(1.12); }
        .ED-General-header__controls {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            flex-wrap: wrap;
        }
        .ED-General-lang-select-container {
            position: relative;
            display: inline-block;
        }
        .ED-General-lang-select {
            padding: 0.48rem 2.1rem 0.48rem 0.9rem;
            border-radius: 22px;
            border: 1.5px solid var(--ED-General-color-border);
            background: var(--ED-General-select-wrapper-bg);
            color: var(--ED-General-color-text-primary);
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 600;
            font-family: var(--ED-General-font-stack);
            transition: all 0.22s ease;
            white-space: nowrap;
            appearance: none;
            -webkit-appearance: none;
            box-shadow: 0 1px 3px var(--ED-General-color-shadow);
        }
        .ED-General-lang-select::-ms-expand { display: none; }
        .ED-General-lang-select option {
            background: var(--ED-General-select-wrapper-bg);
            color: var(--ED-General-color-text-primary);
        }
        .ED-General-lang-select-container::after {
            content: '▾';
            position: absolute;
            top: 50%;
            right: 0.7rem;
            transform: translateY(-50%);
            pointer-events: none;
            font-size: 0.9rem;
            color: var(--ED-General-select-arrow-color);
            transition: color 0.22s ease;
        }
        .ED-General-lang-select:hover {
            border-color: var(--ED-General-color-accent-default);
            background-color: var(--ED-General-color-accent-soft);
        }
        .ED-General-theme-toggle {
            width: 41px; height: 41px;
            border-radius: 50%;
            border: 1.5px solid var(--ED-General-color-border);
            background: var(--ED-General-color-surface);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.28s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--ED-General-color-text-primary);
            font-size: 1.2rem;
            flex-shrink: 0;
            box-shadow: 0 1px 4px var(--ED-General-color-shadow);
            position: relative;
            overflow: hidden;
        }
        .ED-General-theme-toggle::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: radial-gradient(circle at center, var(--ED-General-color-accent-default) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .ED-General-theme-toggle:hover::after { opacity: 0.06; }
        .ED-General-theme-toggle:hover {
            border-color: var(--ED-General-color-accent-default);
            background: var(--ED-General-color-accent-soft);
            box-shadow: 0 4px 16px rgba(74,127,217,0.15);
            transform: scale(1.06);
        }
        .ED-General-theme-toggle .ED-General-icon-sun,
        .ED-General-theme-toggle .ED-General-icon-moon {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            line-height: 1;
            transition: all 0.38s cubic-bezier(0.4, 0, 0.2, 1);
            position: absolute;
            pointer-events: none;
        }
        .ED-General-theme-toggle .ED-General-icon-sun {
            opacity: 1; transform: rotate(0deg) scale(1);
            color: var(--ED-General-color-icon-sun);
            filter: drop-shadow(0 0 3px var(--ED-General-color-icon-sun-glow));
        }
        .ED-General-theme-toggle .ED-General-icon-moon {
            opacity: 0; transform: rotate(-90deg) scale(0.5);
            color: var(--ED-General-color-icon-moon);
            filter: drop-shadow(0 0 4px var(--ED-General-color-icon-moon-glow));
        }
        [data-theme="dark"] .ED-General-theme-toggle .ED-General-icon-sun {
            opacity: 0; transform: rotate(90deg) scale(0.5);
        }
        [data-theme="dark"] .ED-General-theme-toggle .ED-General-icon-moon {
            opacity: 1; transform: rotate(0deg) scale(1);
        }
        .ED-General-main {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem 1.5rem 3rem;
        }
        .ED-General-legal-content {
            background: var(--ED-General-color-surface);
            border: 1px solid var(--ED-General-color-border);
            border-radius: var(--ED-General-card-radius);
            padding: 2rem;
            transition: all var(--ED-General-transition-speed) ease;
            box-shadow: 0 1px 4px var(--ED-General-color-shadow);
        }
        .ED-General-legal-content h2 {
            font-size: 1.6rem;
            margin-bottom: 1rem;
            color: var(--ED-General-color-text-primary);
        }
        .ED-General-legal-content h3 {
            font-size: 1.2rem;
            margin: 1.5rem 0 0.75rem;
            color: var(--ED-General-color-text-primary);
        }
        .ED-General-legal-content p {
            margin-bottom: 1rem;
            color: var(--ED-General-color-text-secondary);
        }
        .ED-General-legal-content strong { color: var(--ED-General-color-text-primary); }

        /* ---- NEW CONTACT-SPECIFIC STYLES (100% variables) ---- */
        .ED-General-contact-profile {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--ED-General-color-accent-default);
            box-shadow: 0 2px 8px var(--ED-General-color-shadow);
            margin-bottom: 1rem;
            display: block;
        }
        .ED-General-contact-profile-letter {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: var(--ED-General-color-accent-light);
            color: var(--ED-General-color-accent-default);
            font-size: 3rem;
            font-weight: 700;
            display: none; /* shown via inline style when image fails */
            align-items: center;
            justify-content: center;
            border: 3px solid var(--ED-General-color-accent-default);
            box-shadow: 0 2px 8px var(--ED-General-color-shadow);
            margin-bottom: 1rem;
        }
        .ED-General-contact-social {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem 1.25rem;
            margin: 1rem 0;
        }
        .ED-General-contact-social a {
            color: var(--ED-General-color-accent-default);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            padding: 0.25rem 0;
            border-bottom: 2px solid transparent;
            transition: border-color 0.22s ease, color 0.22s ease;
        }
        .ED-General-contact-social a:hover {
            border-bottom-color: var(--ED-General-color-accent-default);
            color: var(--ED-General-color-accent-default);
        }

        /* ---- FOOTER (unchanged) ---- */
        .ED-General-footer {
            border-top: 1px solid var(--ED-General-color-border);
            padding: 2rem 0 1.75rem;
            font-size: 0.8rem;
            color: var(--ED-General-color-text-tertiary);
            transition: all var(--ED-General-transition-speed) ease;
            background: linear-gradient(180deg, var(--ED-General-color-bg-secondary) 0%, var(--ED-General-color-bg) 60%);
            box-shadow: 0 -1px 8px var(--ED-General-color-shadow);
            position: relative;
        }
        .ED-General-footer::before {
            content: '';
            position: absolute;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 55px; height: 3px;
            background: var(--ED-General-color-accent-default);
            border-radius: 0 0 3px 3px;
            opacity: 0.55;
            transition: width 0.3s ease, opacity 0.3s ease;
        }
        .ED-General-footer:hover::before { width: 70px; opacity: 0.75; }
        .ED-General-footer__grid {
            display: grid;
            grid-template-columns: 1fr 1.4fr 1fr;
            gap: 2rem;
            padding: 0 1.75rem;
            max-width: 1300px;
            margin: 0 auto;
            align-items: start;
        }
        .ED-General-footer__col { display: flex; flex-direction: column; gap: 0.55rem; }
        .ED-General-footer__col:first-child {
            font-weight: 550;
            letter-spacing: 0.015em;
            color: var(--ED-General-color-text-secondary);
        }
        .ED-General-footer__col:nth-child(2) {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 0.55rem 1.1rem;
            align-items: center;
        }
        .ED-General-footer__col:last-child { text-align: right; gap: 0.35rem; }
        [dir="rtl"] .ED-General-footer__col:last-child { text-align: left; }
        .ED-General-footer a {
            color: var(--ED-General-color-text-secondary);
            text-decoration: none;
            font-weight: 550;
            transition: all 0.22s ease;
            position: relative;
            padding: 0.2rem 0;
        }
        .ED-General-footer a::after {
            content: '';
            position: absolute;
            bottom: -1px; left: 0;
            width: 0; height: 1.5px;
            background: var(--ED-General-color-accent-default);
            border-radius: 1px;
            transition: width 0.25s cubic-bezier(0.4,0,0.2,1);
        }
        .ED-General-footer a:hover { color: var(--ED-General-color-accent-default); }
        .ED-General-footer a:hover::after { width: 100%; }
        @media (max-width: 640px) {
            .ED-General-header__inner { flex-direction: column; align-items: flex-start; }
            .ED-General-header__controls { width: 100%; justify-content: flex-start; }
            .ED-General-main { padding: 1rem 0.75rem 2rem; }
            .ED-General-legal-content { padding: 1.25rem; }
            .ED-General-footer__grid { grid-template-columns: 1fr; text-align: center; gap: 1.25rem; }
            .ED-General-footer__col { align-items: center; }
            .ED-General-footer__col:nth-child(2) { justify-content: center; }
            .ED-General-footer__col:last-child { text-align: center; align-items: center; }
            .ED-General-footer a::after { left: 50%; transform: translateX(-50%); }
            .ED-General-footer a:hover::after { width: 55%; }
        }
    </style>
</head>

            function toggleTheme() { currentTheme = currentTheme === 'light' ? 'dark' : 'light'; applyTheme(); }
