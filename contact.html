<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact – Mejri Ziad</title>
    <link rel="icon" type="image/x-icon" href="assets/icons/icon-64x64.png">
    <link rel="manifest" href="/manifest.json">
    <style>
        :root {
            --ED-General-color-bg: #f5f1eb;
            --ED-General-color-surface: #ffffff;
            --ED-General-color-text-primary: #1e293b;
            --ED-General-color-text-secondary: #5a6c7d;
            --ED-General-color-border: #e2dcd4;
            --ED-General-color-accent-default: #4a7fd9;
            --ED-General-color-accent-soft: #f0f5fc;
            --ED-General-color-text-on-accent: #ffffff;
            --ED-General-color-shadow: rgba(60, 50, 40, 0.07);
            --ED-General-font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                "Helvetica Neue", Arial, "Noto Sans", "Noto Sans Arabic", sans-serif;
        }
        [data-theme="dark"] {
            --ED-General-color-bg: #171a20;
            --ED-General-color-surface: #23262f;
            --ED-General-color-text-primary: #e2e4ea;
            --ED-General-color-text-secondary: #b0b5c2;
            --ED-General-color-border: #32353e;
            --ED-General-color-accent-default: #7aafff;
            --ED-General-color-accent-soft: #1a2535;
            --ED-General-color-text-on-accent: #12151c;
            --ED-General-color-shadow: rgba(0, 0, 0, 0.25);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--ED-General-font-stack);
            background: var(--ED-General-color-bg);
            color: var(--ED-General-color-text-primary);
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }
        .ED-General-contact-container {
            max-width: 900px; margin: 2rem auto; padding: 0 1.5rem;
        }
        /* Profile header */
        .ED-General-profile-header {
            display: flex; align-items: center; gap: 2rem; margin-bottom: 2rem;
            background: var(--ED-General-color-surface);
            border: 1px solid var(--ED-General-color-border);
            border-radius: 16px; padding: 2rem;
            box-shadow: 0 4px 12px var(--ED-General-color-shadow);
        }
        .ED-General-profile-img-wrapper {
            flex-shrink: 0;
        }
        .ED-General-profile-img {
            width: 130px; height: 130px; border-radius: 50%; object-fit: cover;
            border: 3px solid var(--ED-General-color-accent-default);
        }
        .ED-General-profile-info-block {
            flex: 1;
        }
        .ED-General-profile-name {
            font-size: 2rem; font-weight: 700; margin-bottom: 0.3rem;
        }
        .ED-General-profile-title {
            font-size: 1.1rem; color: var(--ED-General-color-accent-default);
            margin-bottom: 0.5rem; font-weight: 600;
        }
        .ED-General-profile-bio {
            color: var(--ED-General-color-text-secondary);
            line-height: 1.6; margin-bottom: 0.8rem;
        }
        .ED-General-profile-details {
            display: flex; flex-wrap: wrap; gap: 0.5rem 2rem;
            color: var(--ED-General-color-text-secondary); font-size: 0.95rem;
        }
        .ED-General-profile-details span {
            display: inline-flex; align-items: center; gap: 0.3rem;
        }
        /* Social grid */
        .ED-General-section-title {
            font-size: 1.4rem; font-weight: 700; margin-bottom: 1rem;
            border-bottom: 1px solid var(--ED-General-color-border);
            padding-bottom: 0.5rem;
        }
        .ED-General-social-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 0.8rem;
        }
        .ED-General-social-card {
            display: flex; align-items: center; gap: 0.6rem;
            background: var(--ED-General-color-surface);
            border: 1px solid var(--ED-General-color-border);
            border-radius: 12px; padding: 0.8rem 1rem;
            text-decoration: none; color: var(--ED-General-color-text-primary);
            transition: transform 0.2s, background 0.2s, border-color 0.2s;
        }
        .ED-General-social-card:hover {
            background: var(--ED-General-color-accent-default);
            color: var(--ED-General-color-text-on-accent);
            border-color: transparent;
            transform: translateY(-2px);
        }
        .ED-General-social-icon-small { font-size: 1.6rem; width: 28px; text-align: center; }
        .ED-General-social-img { width: 28px; height: 28px; object-fit: contain; }
        /* Install & offline banner (from index) */
        .ED-General-offline-banner {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--ED-General-color-accent-default);
            color: var(--ED-General-color-text-on-accent);
            text-align: center; padding: 0.5rem; z-index: 1000;
            font-weight: 600; display: none;
        }
        .ED-General-update-banner {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--ED-General-color-accent-default);
            color: var(--ED-General-color-text-on-accent);
            display: flex; justify-content: center; align-items: center;
            gap: 1rem; padding: 0.8rem; z-index: 1000; display: none;
        }
        .ED-General-header-btn {
            background: var(--ED-General-color-surface);
            border: 1.5px solid var(--ED-General-color-border);
            border-radius: 22px; padding: 0.45rem 1rem;
            font-size: 0.82rem; font-weight: 600; cursor: pointer;
            display: none; /* shown if install available */
        }
        @media (max-width: 640px) {
            .ED-General-profile-header {
                flex-direction: column; text-align: center;
            }
            .ED-General-social-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>
    <header id="header-container"></header>

    <main class="ED-General-contact-container">
        <!-- Profile Card -->
        <div class="ED-General-profile-header">
            <div class="ED-General-profile-img-wrapper">
                <img src="assets/mejri-ziad.jpg" alt="Mejri Ziad" class="ED-General-profile-img" id="profileImg"
                     onerror="this.style.display='none'; document.getElementById('profileFallback').style.display='flex';">
                <div id="profileFallback" style="display:none; width:130px; height:130px; border-radius:50%;
                            background:var(--ED-General-color-accent-default); color:white; align-items:center;
                            justify-content:center; font-size:3rem; margin:0 auto;">
                    MZ
                </div>
            </div>
            <div class="ED-General-profile-info-block">
                <h1 class="ED-General-profile-name" data-i18n="profile.name">Mejri Ziad</h1>
                <div class="ED-General-profile-title" data-i18n="profile.title">Full‑stack Developer & Educator</div>
                <p class="ED-General-profile-bio" data-i18n="profile.bio"></p>
                <div class="ED-General-profile-details">
                    <span>📍 <span data-i18n="profile.location">Tunis, Tunisia</span></span>
                    <span>✉️ <span data-i18n="profile.email">contact@mejriziad.tn</span></span>
                    <span>📱 <span data-i18n="profile.phone" dir="ltr">+216 12 345 678</span></span>
                </div>
            </div>
        </div>

        <!-- Social Media Section -->
        <h2 class="ED-General-section-title" data-i18n="social.title">Connect with me</h2>
        <div class="ED-General-social-grid" id="socialGrid"></div>
    </main>

    <footer id="footer-container"></footer>

    <!-- Offline banner -->
    <div id="offline-banner" class="ED-General-offline-banner" data-i18n="offlineBanner">You are offline.</div>
    <!-- Update banner -->
    <div id="update-banner" class="ED-General-update-banner" style="display:none;">
        <span data-i18n="updateNotification">A new version is available.</span>
        <button id="update-reload-btn" data-i18n="updateReloadBtn">Reload</button>
    </div>
    <!-- Install button (hidden by default) -->
    <button class="ED-General-header-btn" id="installBtn" style="display:none;" data-i18n="installBtn">📲 Install App</button>

    <script>
        // ================== SOCIAL MEDIA DATA ==================
        const socialMedias = [
            { mediaLink: 'https://linkedin.com/in/mejriziad', mediaSmallIcon: '🔗', mediaImage: 'assets/icons/linkedin.png', en: { mediaName: 'LinkedIn' }, fr: { mediaName: 'LinkedIn' }, ar: { mediaName: 'لينكد إن' } },
            { mediaLink: 'https://github.com/mejriziad', mediaSmallIcon: '🐙', mediaImage: 'assets/icons/github.png', en: { mediaName: 'GitHub' }, fr: { mediaName: 'GitHub' }, ar: { mediaName: 'غيت هاب' } },
            { mediaLink: 'https://twitter.com/mejriziad', mediaSmallIcon: '𝕏', mediaImage: 'assets/icons/x-twitter.png', en: { mediaName: 'X (Twitter)' }, fr: { mediaName: 'X (Twitter)' }, ar: { mediaName: 'إكس (تويتر)' } },
            { mediaLink: 'https://facebook.com/mejriziad', mediaSmallIcon: '📘', mediaImage: 'assets/icons/facebook.png', en: { mediaName: 'Facebook' }, fr: { mediaName: 'Facebook' }, ar: { mediaName: 'فيسبوك' } },
            { mediaLink: 'https://youtube.com/@mejriziad', mediaSmallIcon: '▶️', mediaImage: 'assets/icons/youtube.png', en: { mediaName: 'YouTube' }, fr: { mediaName: 'YouTube' }, ar: { mediaName: 'يوتيوب' } },
            { mediaLink: 'https://instagram.com/mejriziad', mediaSmallIcon: '📷', mediaImage: 'assets/icons/instagram.png', en: { mediaName: 'Instagram' }, fr: { mediaName: 'Instagram' }, ar: { mediaName: 'انستغرام' } },
            { mediaLink: 'https://tiktok.com/@mejriziad', mediaSmallIcon: '🎵', mediaImage: 'assets/icons/tiktok.png', en: { mediaName: 'TikTok' }, fr: { mediaName: 'TikTok' }, ar: { mediaName: 'تيك توك' } },
            { mediaLink: 'https://medium.com/@mejriziad', mediaSmallIcon: '📝', mediaImage: 'assets/icons/medium.png', en: { mediaName: 'Medium' }, fr: { mediaName: 'Medium' }, ar: { mediaName: 'ميديوم' } },
            { mediaLink: 'https://wa.me/21612345678', mediaSmallIcon: '💬', mediaImage: 'assets/icons/whatsapp.png', en: { mediaName: 'WhatsApp' }, fr: { mediaName: 'WhatsApp' }, ar: { mediaName: 'واتساب' } },
            { mediaLink: 'https://t.me/mejriziad', mediaSmallIcon: '✈️', mediaImage: 'assets/icons/telegram.png', en: { mediaName: 'Telegram' }, fr: { mediaName: 'Telegram' }, ar: { mediaName: 'تيليغرام' } },
            { mediaLink: 'https://discord.gg/mejriziad', mediaSmallIcon: '🎮', mediaImage: 'assets/icons/discord.png', en: { mediaName: 'Discord' }, fr: { mediaName: 'Discord' }, ar: { mediaName: 'ديسكورد' } },
            { mediaLink: 'https://stackoverflow.com/users/mejriziad', mediaSmallIcon: '📚', mediaImage: 'assets/icons/stackoverflow.png', en: { mediaName: 'Stack Overflow' }, fr: { mediaName: 'Stack Overflow' }, ar: { mediaName: 'ستاك أوفرفلو' } }
        ];

        // ================== TRANSLATIONS ==================
        const uiText = {
    en: {
        profile: {
            name: 'Mejri Ziad',
            title: 'Full‑stack Developer & Educator',
            bio: 'Passionate about building multilingual learning platforms and open‑source tools. I love turning complex ideas into simple, accessible digital experiences.',
            location: 'Tunis, Tunisia',
            email: 'contact@mejriziad.tn',
            phone: '+216 12 345 678'
        },
        social: { title: 'Connect with me' },
        installBtn: '📲 Install App',
        offlineBanner: 'You are offline. Some features may be unavailable.',
        updateNotification: 'A new version is available.',
        updateReloadBtn: 'Reload',
        imageAlt: 'Profile photo',
        noLink: '(link not set)',
        // Footer translations (same as index)
        footer: {
            version: "version '0.0.1'",
            confidentiality: 'Confidentiality Politics',
            terms: 'Terms of Use',
            contact: 'Contact',
            developer: 'developed by: Mejri Ziad.',
            hosted: 'Hosted on Github and Netlify.'
        },
        enablePeriodicSyncBtn: 'Enable Background Updates',
        disablePeriodicSyncBtn: 'Disable Background Updates',
        periodicSyncEnabled: 'Background updates enabled!',
        periodicSyncDisabled: 'Background updates disabled!',
        periodicSyncDenied: 'Permission not granted. Please check site settings.',
        dashboardTitle: 'Educational Dashboard' // fallback if needed
    },
    fr: {
        profile: {
            name: 'Mejri Ziad',
            title: 'Développeur Full‑stack & Formateur',
            bio: 'Passionné par la création de plateformes d’apprentissage multilingues et d’outils open‑source. J’aime transformer des idées complexes en expériences numériques simples et accessibles.',
            location: 'Tunis, Tunisie',
            email: 'contact@mejriziad.tn',
            phone: '+216 12 345 678'
        },
        social: { title: 'Connectez‑vous avec moi' },
        installBtn: '📲 Installer l’application',
        offlineBanner: 'Vous êtes hors ligne. Certaines fonctionnalités peuvent être indisponibles.',
        updateNotification: 'Une nouvelle version est disponible.',
        updateReloadBtn: 'Recharger',
        imageAlt: 'Photo de profil',
        noLink: '(lien non défini)',
        footer: {
            version: "version '0.0.1'",
            confidentiality: 'Politique de confidentialité',
            terms: 'Conditions d’utilisation',
            contact: 'Contact',
            developer: 'développé par : Mejri Ziad.',
            hosted: 'Hébergé sur Github et Netlify.'
        },
        enablePeriodicSyncBtn: 'Activer les mises à jour en arrière-plan',
        disablePeriodicSyncBtn: 'Désactiver les mises à jour en arrière-plan',
        periodicSyncEnabled: 'Mises à jour en arrière-plan activées !',
        periodicSyncDisabled: 'Mises à jour en arrière-plan désactivées !',
        periodicSyncDenied: 'Permission non accordée. Veuillez vérifier les paramètres du site.',
        dashboardTitle: 'Tableau de Bord Éducatif'
    },
    ar: {
        profile: {
            name: 'ماجري زياد',
            title: 'مطور شامل ومعلم',
            bio: 'شغوف ببناء منصات تعليمية متعددة اللغات وأدوات مفتوحة المصدر. أحب تحويل الأفكار المعقدة إلى تجارب رقمية بسيطة ومتاحة.',
            location: 'تونس العاصمة، تونس',
            email: 'contact@mejriziad.tn',
            phone: '+216 12 345 678'
        },
        social: { title: 'تواصل معي' },
        installBtn: '📲 تثبيت التطبيق',
        offlineBanner: 'أنت غير متصل. قد لا تتوفر بعض الميزات.',
        updateNotification: 'نسخة جديدة متاحة.',
        updateReloadBtn: 'إعادة التحميل',
        imageAlt: 'صورة الملف الشخصي',
        noLink: '(الرابط غير محدد)',
        footer: {
            version: "الإصدار '0.0.1'",
            confidentiality: 'سياسة الخصوصية',
            terms: 'شروط الاستخدام',
            contact: 'اتصل بنا',
            developer: 'طور بواسطة: ماجري زياد.',
            hosted: 'مستضاف على Github و Netlify.'
        },
        enablePeriodicSyncBtn: 'تفعيل التحديثات في الخلفية',
        disablePeriodicSyncBtn: 'تعطيل التحديثات في الخلفية',
        periodicSyncEnabled: 'تم تفعيل التحديثات في الخلفية!',
        periodicSyncDisabled: 'تم تعطيل التحديثات في الخلفية!',
        periodicSyncDenied: 'لم يتم منح الإذن. يرجى التحقق من إعدادات الموقع.',
        dashboardTitle: 'لوحة التحكم التعليمية'
    }
};

        // ================== STATE ==================
        let currentLang = localStorage.getItem('dashboardLang') || 'en';
        let currentTheme = localStorage.getItem('dashboardTheme') || 'light';
        let deferredPrompt;

        function t(key) {
            return key.split('.').reduce((o, k) => (o && o[k] !== undefined ? o[k] : ''), uiText[currentLang]) || key;
        }

        function applyTheme() {
            document.documentElement.setAttribute('data-theme', currentTheme);
            localStorage.setItem('dashboardTheme', currentTheme);
        }

        function renderSocialGrid() {
            const grid = document.getElementById('socialGrid');
            if (!grid) return;
            grid.innerHTML = socialMedias.map(sm => {
                const name = sm[currentLang]?.mediaName || sm.en.mediaName;
                const link = sm.mediaLink || '#';
                const disabled = !sm.mediaLink;
                const smallIcon = `<span class="ED-General-social-icon-small">${sm.mediaSmallIcon}</span>`;
                const imgTag = sm.mediaImage
                    ? `<img src="${sm.mediaImage}" class="ED-General-social-img" alt="${name}"
                         onerror="this.style.display='none'; this.previousElementSibling.style.display='inline-block';">`
                    : '';
                const titleAttr = disabled ? ` title="${t('noLink')}"` : '';
                return `<a href="${link}" class="ED-General-social-card" target="_blank" rel="noopener"
                           ${disabled ? 'style="opacity:0.6; pointer-events:none;"' + titleAttr : ''}>
                            ${sm.mediaImage ? imgTag + smallIcon : smallIcon}
                            <span>${name}</span>
                        </a>`;
            }).join('');
        }

        function translatePage() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                const text = t(key);
                if (text) el.textContent = text;
            });
            document.documentElement.lang = currentLang;
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            const langSelect = document.getElementById('langSelect');
            if (langSelect) langSelect.value = currentLang;
            renderSocialGrid();
            document.getElementById('profileImg').alt = t('imageAlt');
            // Update install button text
            const installBtn = document.getElementById('installBtn');
            if (installBtn) installBtn.textContent = t('installBtn');
        }

        // ================== PWA features ==================
        function setupPWA() {
            // Install prompt
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                const installBtn = document.getElementById('installBtn');
                if (installBtn) {
                    installBtn.style.display = 'inline-flex';
                    installBtn.textContent = t('installBtn');
                    installBtn.onclick = async () => {
                        if (!deferredPrompt) return;
                        deferredPrompt.prompt();
                        const { outcome } = await deferredPrompt.userChoice;
                        deferredPrompt = null;
                        installBtn.style.display = 'none';
                    };
                }
            });

            window.addEventListener('appinstalled', () => {
                deferredPrompt = null;
                const installBtn = document.getElementById('installBtn');
                if (installBtn) installBtn.style.display = 'none';
            });

            // Offline/online banners
            const offlineBanner = document.getElementById('offline-banner');
            window.addEventListener('offline', () => { if (offlineBanner) offlineBanner.style.display = 'block'; });
            window.addEventListener('online', () => { if (offlineBanner) offlineBanner.style.display = 'none'; });
            if (!navigator.onLine && offlineBanner) offlineBanner.style.display = 'block';

            // Service Worker registration & update banner
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => {
                        console.log('SW registered');
                        reg.addEventListener('updatefound', () => {
                            const installingWorker = reg.installing;
                            installingWorker.addEventListener('statechange', () => {
                                if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    const updateBanner = document.getElementById('update-banner');
                                    if (updateBanner) updateBanner.style.display = 'flex';
                                }
                            });
                        });
                    })
                    .catch(err => console.error('SW registration failed', err));

                navigator.serviceWorker.addEventListener('message', event => {
                    if (event.data && event.data.type === 'NEW_VERSION_READY') {
                        const updateBanner = document.getElementById('update-banner');
                        if (updateBanner) updateBanner.style.display = 'flex';
                    }
                });
            }

            document.getElementById('update-reload-btn')?.addEventListener('click', () => {
                window.location.reload();
            });
        }

        // ================== LOAD HEADER & FOOTER ==================
        async function loadComponents() {
            try {
                const [headerResp, footerResp] = await Promise.all([
                    fetch('header.html'),
                    fetch('footer.html')
                ]);
                if (!headerResp.ok || !footerResp.ok) throw new Error('Missing files');
                document.getElementById('header-container').innerHTML = await headerResp.text();
                document.getElementById('footer-container').innerHTML = await footerResp.text();
            } catch (err) {
                console.warn('Header/footer fallback used.');
                document.getElementById('header-container').innerHTML = `
                    <header style="padding:1rem; background:var(--ED-General-color-surface); border-bottom:1px solid var(--ED-General-color-border);">
                        <h1 style="color:var(--ED-General-color-text-primary);">Mejri Ziad</h1>
                    </header>`;
                document.getElementById('footer-container').innerHTML = `
                    <footer style="padding:1rem; text-align:center; color:var(--ED-General-color-text-secondary);">Contact page</footer>`;
            }

            // Attach header events
            const langSelect = document.getElementById('langSelect');
            if (langSelect) {
                langSelect.value = currentLang;
                langSelect.addEventListener('change', () => {
                    currentLang = langSelect.value;
                    localStorage.setItem('dashboardLang', currentLang);
                    translatePage();
                });
            }
            const themeToggle = document.getElementById('themeToggle');
            if (themeToggle) {
                themeToggle.addEventListener('click', () => {
                    currentTheme = currentTheme === 'light' ? 'dark' : 'light';
                    applyTheme();
                });
            }
        }

        // ================== INIT ==================
        async function init() {
            applyTheme();
            await loadComponents();
            translatePage();
            setupPWA();
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
