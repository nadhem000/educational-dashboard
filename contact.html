/* ========== Contact‑specific styles ========== */
.ED-General-contact-container {
    max-width: 900px;
    margin: 2rem auto;
    padding: 0 1.5rem;
}

.ED-General-profile-header {
    display: flex;
    align-items: center;
    gap: 2rem;
    margin-bottom: 2rem;
    background: var(--ED-General-color-surface);
    border: 1px solid var(--ED-General-color-border);
    border-radius: var(--ED-General-card-radius);
    padding: 2rem;
    box-shadow: 0 4px 12px var(--ED-General-color-shadow);
}

.ED-General-profile-img-wrapper { flex-shrink: 0; }

.ED-General-profile-img {
    width: 130px; height: 130px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid var(--ED-General-color-accent-default);
}

.ED-General-profile-info-block { flex: 1; }

.ED-General-profile-name {
    font-size: 2rem; font-weight: 700; margin-bottom: 0.3rem;
}

.ED-General-profile-title {
    font-size: 1.1rem;
    color: var(--ED-General-color-accent-default);
    margin-bottom: 0.5rem;
    font-weight: 600;
}

.ED-General-profile-bio {
    color: var(--ED-General-color-text-secondary);
    line-height: 1.6;
    margin-bottom: 0.8rem;
}

.ED-General-profile-details {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem 2rem;
    color: var(--ED-General-color-text-secondary);
    font-size: 0.95rem;
}

.ED-General-section-title {
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 1rem;
    border-bottom: 1px solid var(--ED-General-color-border);
    padding-bottom: 0.5rem;
}

.ED-General-social-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 0.8rem;
}

.ED-General-social-card {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    background: var(--ED-General-color-surface);
    border: 1px solid var(--ED-General-color-border);
    border-radius: 12px;
    padding: 0.8rem 1rem;
    text-decoration: none;
    color: var(--ED-General-color-text-primary);
    transition: transform 0.2s, background 0.2s, border-color 0.2s;
}

.ED-General-social-card:hover {
    background: var(--ED-General-color-accent-default);
    color: var(--ED-General-color-text-on-accent);
    border-color: transparent;
    transform: translateY(-2px);
}

.ED-General-social-icon-small {
    font-size: 1.6rem;
    width: 28px;
    text-align: center;
}

.ED-General-social-img {
    width: 28px; height: 28px;
    object-fit: contain;
}

@media (max-width: 640px) {
    .ED-General-profile-header {
        flex-direction: column;
        text-align: center;
    }
    .ED-General-social-grid {
        grid-template-columns: 1fr 1fr;
    }
}

function updateConnectionStatus() {
    const dot = document.getElementById('status-dot');
    const label = document.getElementById('connection-status-label');
    const statusSpan = document.getElementById('connection-status');
    if (!dot || !statusSpan) return;
    const online = navigator.onLine;
    dot.className = 'status-dot' + (online ? '' : ' offline');
    if (label) {
        label.textContent = online ? t('onlineStatus') : t('offlineStatus');
    }
    statusSpan.title = online ? t('onlineStatus') : t('offlineStatus');
}

function setupConnectionIndicator() {
    const statusSpan = document.getElementById('connection-status');
    if (!statusSpan) return;
    window.addEventListener('online', updateConnectionStatus);
    window.addEventListener('offline', updateConnectionStatus);
    updateConnectionStatus();
}
        function translatePage() {
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        const text = t(key);
        if (text) el.textContent = text;
    });
    // 🔁 loop
    document.querySelectorAll('[data-i18n-title]').forEach(el => {
        const key = el.getAttribute('data-i18n-title');
        const text = t(key);
        if (text) el.setAttribute('title', text);
    });

    document.documentElement.lang = currentLang;
    document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
    const langSelect = document.getElementById('langSelect');
    if (langSelect) langSelect.value = currentLang;
    renderSocialGrid();
    document.getElementById('profileImg').alt = t('profile.imageAlt');
    const installBtn = document.getElementById('installBtn');
    if (installBtn) installBtn.textContent = t('installBtn');
    // Refresh connection status tooltip after language change
    updateConnectionStatus();
}

        // ================== PWA ==================
        function setupPWA() {
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                const installBtn = document.getElementById('installBtn');
                if (installBtn) {
                    installBtn.style.display = 'inline-flex';
                    installBtn.textContent = t('installBtn');
                    installBtn.onclick = async () => {
                        if (!deferredPrompt) return;
                        deferredPrompt.prompt();
                        const { outcome } = await deferredPrompt.userChoice;
                        deferredPrompt = null;
                        installBtn.style.display = 'none';
                    };
                }
            });
            window.addEventListener('appinstalled', () => {
                deferredPrompt = null;
                const installBtn = document.getElementById('installBtn');
                if (installBtn) installBtn.style.display = 'none';
            });

            const offlineBanner = document.getElementById('offline-banner');
            window.addEventListener('offline', () => { if (offlineBanner) offlineBanner.style.display = 'block'; });
            window.addEventListener('online', () => { if (offlineBanner) offlineBanner.style.display = 'none'; });
            if (!navigator.onLine && offlineBanner) offlineBanner.style.display = 'block';

            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => {
                        console.log('SW registered');
                        reg.addEventListener('updatefound', () => {
                            const installingWorker = reg.installing;
                            installingWorker.addEventListener('statechange', () => {
                                if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    const updateBanner = document.getElementById('update-banner');
                                    if (updateBanner) updateBanner.style.display = 'flex';
                                }
                            });
                        });
                    })
                    .catch(err => console.error('SW registration failed', err));
                navigator.serviceWorker.addEventListener('message', event => {
                    if (event.data && event.data.type === 'NEW_VERSION_READY') {
                        const updateBanner = document.getElementById('update-banner');
                        if (updateBanner) updateBanner.style.display = 'flex';
                    }
                });
            }
            document.getElementById('update-reload-btn')?.addEventListener('click', () => {
                window.location.reload();
            });
        }

        // ================== LOAD HEADER & FOOTER ==================
        async function loadComponents() {
            try {
                const [headerResp, footerResp] = await Promise.all([
                    fetch('header.html'),
                    fetch('footer.html')
                ]);
                if (!headerResp.ok || !footerResp.ok) throw new Error('Missing files');
                document.getElementById('header-container').innerHTML = await headerResp.text();
                document.getElementById('footer-container').innerHTML = await footerResp.text();
            } catch (err) {
                console.warn('Header/footer fallback used.');
                document.getElementById('header-container').innerHTML = `
                    <header style="padding:1rem; background:var(--ED-General-color-surface); border-bottom:1px solid var(--ED-General-color-border);">
                        <h1 style="color:var(--ED-General-color-text-primary);">Mejri Ziad</h1>
                    </header>`;
                document.getElementById('footer-container').innerHTML = `
                    <footer style="padding:1rem; text-align:center; color:var(--ED-General-color-text-secondary);">Contact page</footer>`;
            }

            // Attach header events
            const langSelect = document.getElementById('langSelect');
            if (langSelect) {
                langSelect.value = currentLang;
                langSelect.addEventListener('change', () => {
                    currentLang = langSelect.value;
                    localStorage.setItem('dashboardLang', currentLang);
                    translatePage();
                });
            }
            const themeToggle = document.getElementById('themeToggle');
            if (themeToggle) {
                themeToggle.addEventListener('click', () => {
                    currentTheme = currentTheme === 'light' ? 'dark' : 'light';
                    applyTheme();
                });
            }
        }

        // ================== INIT ==================
        async function init() {
            applyTheme();
            await loadComponents();
    setupConnectionIndicator();
            translatePage();
            setupPWA();
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
