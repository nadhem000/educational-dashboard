                         onerror="this.style.display='none'; this.previousElementSibling.style.display='inline-block';">`
                    : '';
                const titleAttr = disabled ? ` title="${t('noLink')}"` : '';
                return `<a href="${link}" class="ED-General-social-card" target="_blank" rel="noopener"
                           ${disabled ? 'style="opacity:0.6; pointer-events:none;"' + titleAttr : ''}>
                            ${sm.mediaImage ? imgTag + smallIcon : smallIcon}
                            <span>${name}</span>
                        </a>`;
            }).join('');
        }

        function translatePage() {
            const lang = currentLang;
            // Handle data-i18n
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                const text = t(key);
                if (text) el.textContent = text;
            });
            // Handle data-i18n-title (theme toggle title)
            document.querySelectorAll('[data-i18n-title]').forEach(el => {
                const key = el.getAttribute('data-i18n-title');
                const text = t(key);
                if (text) el.setAttribute('title', text);
            });
            document.documentElement.lang = lang;
            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            const langSelect = document.getElementById('langSelect');
            if (langSelect) langSelect.value = lang;
            renderSocialGrid();
            document.getElementById('profileImg').alt = t('profile.imageAlt');
            const installBtn = document.getElementById('installBtn');
            if (installBtn) installBtn.textContent = t('installBtn');
            // Update connection status label if present
            const statusLabel = document.getElementById('connection-status-label');
            if (statusLabel) {
                statusLabel.textContent = navigator.onLine ? t('onlineStatus') : t('offlineStatus');
            }
        }

        // ================== PWA ==================
        function setupPWA() {
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                const installBtn = document.getElementById('installBtn');
                if (installBtn) {
                    installBtn.style.display = 'inline-flex';
                    installBtn.textContent = t('installBtn');
                    installBtn.onclick = async () => {
                        if (!deferredPrompt) return;
                        deferredPrompt.prompt();
                        const { outcome } = await deferredPrompt.userChoice;
                        deferredPrompt = null;
                        installBtn.style.display = 'none';
                    };
                }
            });
            window.addEventListener('appinstalled', () => {
                deferredPrompt = null;
                const installBtn = document.getElementById('installBtn');
                if (installBtn) installBtn.style.display = 'none';
            });

            const offlineBanner = document.getElementById('offline-banner');
            window.addEventListener('offline', () => { if (offlineBanner) offlineBanner.style.display = 'block'; });
            window.addEventListener('online', () => { if (offlineBanner) offlineBanner.style.display = 'none'; });
            if (!navigator.onLine && offlineBanner) offlineBanner.style.display = 'block';

            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => {
                        console.log('SW registered');
                        reg.addEventListener('updatefound', () => {
                            const installingWorker = reg.installing;
                            installingWorker.addEventListener('statechange', () => {
                                if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    const updateBanner = document.getElementById('update-banner');
                                    if (updateBanner) updateBanner.style.display = 'flex';
                                }
                            });
                        });
                    })
                    .catch(err => console.error('SW registration failed', err));
                navigator.serviceWorker.addEventListener('message', event => {
                    if (event.data && event.data.type === 'NEW_VERSION_READY') {
                        const updateBanner = document.getElementById('update-banner');
                        if (updateBanner) updateBanner.style.display = 'flex';
                    }
                });
            }
            document.getElementById('update-reload-btn')?.addEventListener('click', () => {
                window.location.reload();
            });
        }

        // ================== LOAD HEADER & FOOTER ==================
        async function loadComponents() {
            try {
                const [headerResp, footerResp] = await Promise.all([
                    fetch('header.html'),
                    fetch('footer.html')
                ]);
                if (!headerResp.ok || !footerResp.ok) throw new Error('Missing files');
                document.getElementById('header-container').innerHTML = await headerResp.text();
                document.getElementById('footer-container').innerHTML = await footerResp.text();
            } catch (err) {
                console.warn('Header/footer fallback used.');
                document.getElementById('header-container').innerHTML = `
                    <header style="padding:1rem; background:var(--ED-General-color-surface); border-bottom:1px solid var(--ED-General-color-border);">
                        <h1 style="color:var(--ED-General-color-text-primary);">Mejri Ziad</h1>
                    </header>`;
                document.getElementById('footer-container').innerHTML = `
                    <footer style="padding:1rem; text-align:center; color:var(--ED-General-color-text-secondary);">Contact page</footer>`;
            }

            // Attach header events
            const langSelect = document.getElementById('langSelect');
            if (langSelect) {
                langSelect.value = currentLang;
                langSelect.addEventListener('change', () => {
                    currentLang = langSelect.value;
                    localStorage.setItem('dashboardLang', currentLang);
                    translatePage();
                });
            }
            const themeToggle = document.getElementById('themeToggle');
            if (themeToggle) {
                themeToggle.addEventListener('click', () => {
                    currentTheme = currentTheme === 'light' ? 'dark' : 'light';
                    applyTheme();
                });
            }
        }

        // ================== INIT ==================
        async function init() {
            applyTheme();
            await loadComponents();
            translatePage();
            setupPWA();
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
