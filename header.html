<header class="ED-General-header">
    <div class="ED-General-header__inner">
        <h1 class="ED-General-header__title" id="dashboardTitle">
            <img src="assets/icons/icon-96x96.png" alt="Dashboard icon" class="ED-General-header__title-icon" width="26" height="26">
            <span data-i18n="dashboardTitle">Educational Dashboard</span>
        </h1>
        <div class="ED-General-header__controls">
            <!-- Connection status indicator -->
            <span id="connection-status" title="Online">
                <span id="status-dot" class="status-dot"></span>
                <span id="connection-status-label" style="display:none;">Online</span>
            </span>
            <!-- Install button (hidden by default) -->
            <button class="ED-General-header-btn" id="installBtn" title="Install app" style="display: none;" data-i18n="installBtn">📲 Install</button>
            <!-- Language select -->
            <select class="ED-General-lang-select" id="langSelect" aria-label="Choose language">
                <option value="en">English</option>
                <option value="fr">Français</option>
                <option value="ar">العربية</option>
            </select>
            <!-- Theme toggle -->
            <button class="ED-General-theme-toggle" id="themeToggle" aria-label="Toggle dark mode"
            title="Dark/Light Theme" data-i18n-title="themeToggleTitle">
                <span class="ED-General-icon-sun" aria-hidden="true">☀</span>
                <span class="ED-General-icon-moon" aria-hidden="true">☽</span>
            </button>
        </div>
    </div>
</header>
<!-- Welcome bar (visible only when signed in) -->
<div id="welcome-bar" style="display:none; padding: 0.5rem 1.5rem; background: var(--ED-General-color-surface); border-bottom: 1px solid var(--ED-General-color-border); font-family: var(--ED-General-font-stack);">
    <div style="display:flex; align-items:center; gap:0.75rem; max-width:1300px; margin:0 auto;">
        <!-- Avatar container (clickable) -->
        <div id="welcome-avatar-container" style="display:flex; align-items:center; justify-content:center; width:32px; height:32px; border-radius:50%; overflow:hidden; background:var(--ED-General-color-bg-secondary);">
            <img id="welcome-avatar-img" src="" style="width:100%; height:100%; object-fit:cover; display:none;" alt="">
            <span id="welcome-avatar-emoji" style="font-size:1.6rem; line-height:1; display:none;"></span>
        </div>
        <span id="welcome-text" style="font-weight:600; color:var(--ED-General-color-text-primary);"></span>
    </div>
</div>
