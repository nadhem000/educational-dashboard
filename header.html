<header class="ED-General-header">
    <div class="ED-General-header__inner">
        <h1 class="ED-General-header__title" id="dashboardTitle">
            <img src="assets/icons/icon-96x96.png" alt="Dashboard icon" class="ED-General-header__title-icon" width="26" height="26">
            <span data-i18n="dashboardTitle">Educational Dashboard</span>
        </h1>
        <div class="ED-General-header__controls">
            <!-- Install button (hidden by default, shown when possible) -->
            <button class="ED-General-header-btn" id="installBtn" title="Install app" style="display: none;">
                📲 Install
            </button>
            <!-- Notification toggle removed – no VAPID dependency -->
            <select class="ED-General-lang-select" id="langSelect" aria-label="Choose language">
                <option value="en">English</option>
                <option value="fr">Français</option>
                <option value="ar">العربية</option>
            </select>
            <button class="ED-General-theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
                <span class="ED-General-icon-sun" aria-hidden="true">☀</span>
                <span class="ED-General-icon-moon" aria-hidden="true">☽</span>
            </button>
        </div>
    </div>
</header>
