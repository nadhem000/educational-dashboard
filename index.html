[dir="rtl"] {
    direction: rtl;
    text-align: right;
}

[dir="rtl"] .ED-General-card__inside-links {
    justify-content: flex-end;
}

[dir="rtl"] .ED-General-card__main-btn .ED-General-card__main-btn-arrow {
    transform: scaleX(-1);
}

[dir="rtl"] .ED-General-card__main-btn:hover .ED-General-card__main-btn-arrow {
    transform: scaleX(-1) translateX(-3px);
}

[dir="rtl"] .ED-General-inside-link__arrow {
    transform: scaleX(-1);
}

.ED-General-main {
    max-width: 1300px;
    margin: 0 auto;
    padding: 1.75rem 1.5rem 3rem;
}

.ED-General-main__subtitle {
    font-size: 0.9rem;
    color: var(--ED-General-color-text-tertiary);
    margin-bottom: 1.5rem;
    transition: color var(--ED-General-transition-speed) ease;
    letter-spacing: 0.02em;
}

.ED-General-card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: var(--ED-General-grid-gap);
}

.ED-General-card {
    background: var(--ED-General-color-surface);
    border: 1px solid var(--ED-General-color-border);
    border-radius: var(--ED-General-card-radius);
    padding: var(--ED-General-card-padding);
    display: flex;
    flex-direction: column;
    gap: 0.85rem;
    transition: all var(--ED-General-transition-speed) ease;
    box-shadow: 0 var(--card-shadow-offset-y, 3px) var(--card-shadow-blur, 10px)
                rgba(var(--card-accent-r, 60), var(--card-accent-g, 50), var(--card-accent-b, 40), var(--card-shadow-opacity, 0.10)),
                0 1px 4px rgba(var(--card-accent-r, 60), var(--card-accent-g, 50), var(--card-accent-b, 40), calc(var(--card-shadow-opacity, 0.10) * 0.55));
    position: relative;
    overflow: hidden;
    cursor: default;
    --card-accent: var(--ED-General-color-accent-default);
}

.ED-General-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--card-accent);
    border-radius: 0 0 3px 3px;
    opacity: 0;
    transition: opacity 0.3s ease;
}

.ED-General-card:hover {
    border-color: var(--card-accent);
    box-shadow: 0 var(--card-shadow-offset-y-hover, 8px) var(--card-shadow-blur-hover, 30px)
                rgba(var(--card-accent-r, 60), var(--card-accent-g, 50), var(--card-accent-b, 40), var(--card-shadow-opacity-hover, 0.22)),
                0 2px 8px rgba(var(--card-accent-r, 60), var(--card-accent-g, 50), var(--card-accent-b, 40), calc(var(--card-shadow-opacity-hover, 0.22) * 0.45));
    transform: translateY(-3px);
    background: var(--ED-General-color-surface-hover);
}

.ED-General-card:hover::before { opacity: 1; }

.ED-General-card__icon-container {
    width: 52px; height: 52px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--ED-General-card-icon-bg, var(--ED-General-color-icon-container-bg));
    flex-shrink: 0;
    transition: background 0.3s ease, transform 0.3s ease;
    overflow: hidden;
}

.ED-General-card:hover .ED-General-card__icon-container { transform: scale(1.05); }

.ED-General-card__icon-container img {
    width: 38px; height: 38px;
    object-fit: contain;
    border-radius: 6px;
}

.ED-General-card__icon-letter {
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--card-accent);
    text-transform: uppercase;
    line-height: 1;
    display: none;
    align-items: center;
    justify-content: center;
    width: 100%; height: 100%;
}

.ED-General-card__icon-container img[data-error] { display: none; }
.ED-General-card__icon-container img[data-error] + .ED-General-card__icon-letter { display: flex; }

.ED-General-card__name {
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--ED-General-color-text-primary);
}

.ED-General-card__description {
    font-size: 0.875rem;
    color: var(--ED-General-color-text-secondary);
    line-height: 1.55;
    flex-grow: 1;
}

.ED-General-card__inside-links {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-top: 0.1rem;
}

.ED-General-inside-link {
    display: inline-flex;
    align-items: center;
    gap: 0.25rem;
    padding: 0.3rem 0.65rem;
    border-radius: 14px;
    font-size: 0.75rem;
    font-weight: 500;
    text-decoration: none;
    background: var(--ED-General-color-badge-bg);
    color: var(--ED-General-color-badge-text);
    transition: all 0.2s ease;
    white-space: nowrap;
    font-family: var(--ED-General-font-stack);
}

.ED-General-inside-link:hover {
    background: var(--card-accent);
    color: var(--ED-General-color-text-on-accent);
}

.ED-General-inside-link__arrow {
    font-size: 0.7rem;
    opacity: 0.7;
    transition: transform 0.2s ease;
}

.ED-General-inside-link:hover .ED-General-inside-link__arrow {
    opacity: 1;
    transform: translateX(2px);
}

.ED-General-card__main-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
    padding: 0.55rem 1.1rem;
    border-radius: 22px;
    font-size: 0.85rem;
    font-weight: 600;
    text-decoration: none;
    border: none;
    background: var(--card-accent);
    color: var(--ED-General-color-text-on-accent);
    transition: all 0.25s ease;
    font-family: var(--ED-General-font-stack);
    align-self: flex-start;
    margin-top: 0.2rem;
}

.ED-General-card__main-btn:hover {
    filter: brightness(0.9);
    box-shadow: 0 4px 14px var(--ED-General-color-btn-shadow);
    transform: translateY(-1px);
}

.ED-General-card__main-btn-arrow {
    display: inline-block;
    font-size: 1rem;
    font-weight: 700;
    transition: transform 0.25s ease;
    line-height: 1;
}

.ED-General-card__main-btn:hover .ED-General-card__main-btn-arrow {
    transform: translateX(3px);
}

.ED-General-card--education { border-radius: var(--ED-General-card-radius); }
.ED-General-card--others    { border-radius: 12px 20px 12px 20px; }
.ED-General-card--games     { border-radius: 20px 5px 20px 5px; }
.ED-General-card--news      { border-radius: 4px 20px 4px 20px; }
.ED-General-card--obsolete  { border-radius: 8px 22px 8px 22px; opacity: 0.85; filter: grayscale(0.2); }

.ED-General-section-title {
    font-size: 1.25rem;
    font-weight: 650;
    margin: 2rem 0 1rem;
    padding-bottom: 0.35rem;
    border-bottom: 1px solid var(--ED-General-color-border);
    color: var(--ED-General-color-text-primary);
    transition: color var(--ED-General-transition-speed) ease,
                border-color var(--ED-General-transition-speed) ease;
}

/* ---------- Responsive (only card‑related parts remain) ---------- */
@media (max-width: 640px) {
    .ED-General-card-grid {
        grid-template-columns: 1fr;
        gap: 1rem;
    }
    .ED-General-main {
        padding: 1rem 0.75rem 2rem;
    }
    .ED-General-card {
        padding: 1.15rem;
    }
    .ED-General-card__icon-container {
        width: 42px; height: 42px;
        border-radius: 12px;
    }
    .ED-General-card__name {
        font-size: 1rem;
    }
}

@media (min-width: 641px) and (max-width: 1024px) {
    .ED-General-card-grid {
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    }
}
    </style>

    <script>
// Catch runtime errors
window.addEventListener('error', function(event) {
  const entry = {
    time: new Date().toISOString(),
    message: event.message,
    filename: event.filename,
    lineno: event.lineno,
    colno: event.colno,
  };
  // Append to localStorage (you can read it later via console)
  const errors = JSON.parse(localStorage.getItem('startupErrors') || '[]');
  errors.push(entry);
  localStorage.setItem('startupErrors', JSON.stringify(errors));
});

// Catch unhandled promise rejections
window.addEventListener('unhandledrejection', function(event) {
  const entry = {
    time: new Date().toISOString(),
    reason: String(event.reason),
  };
  const errors = JSON.parse(localStorage.getItem('startupErrors') || '[]');
  errors.push(entry);
  localStorage.setItem('startupErrors', JSON.stringify(errors));
});

    let currentLang = localStorage.getItem('dashboardLang') || 'en';
    let currentTheme = localStorage.getItem('dashboardTheme') || 'light';

    function getNestedValue(obj, path) {
        return path.split('.').reduce((o, k) => (o && o[k] !== undefined ? o[k] : undefined), obj) || '';
    }

    function translatePage() {
        const lang = currentLang;
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            const text = getNestedValue(uiText[lang], key);
            if (text) el.textContent = text;
        });
        document.querySelectorAll('[data-i18n-title]').forEach(el => {
            const key = el.getAttribute('data-i18n-title');
            const text = getNestedValue(uiText[lang], key);
            if (text) el.setAttribute('title', text);
        });
        document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
        document.documentElement.lang = lang;
        const langSelect = document.getElementById('langSelect');
        if (langSelect) langSelect.value = lang;
        if (window.updatePeriodicSyncButton) window.updatePeriodicSyncButton();
    }

    function hexToRgb(hex) {
        const clean = hex.replace('#', '');
        const full = clean.length === 3 ? clean[0]+clean[0]+clean[1]+clean[1]+clean[2]+clean[2] : clean;
        const match = /^([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(full);
        if (!match) return { r: 60, g: 50, b: 40 };
        return { r: parseInt(match[1], 16), g: parseInt(match[2], 16), b: parseInt(match[3], 16) };
    }
    function getLuminance(r, g, b) {
        const linearize = (c) => {
            c = c / 255;
            return c <= 0.03928 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
        };
        return 0.2126 * linearize(r) + 0.7152 * linearize(g) + 0.0722 * linearize(b);
    }
    function getHue(r, g, b) {
        const rf = r / 255, gf = g / 255, bf = b / 255;
        const max = Math.max(rf, gf, bf), min = Math.min(rf, gf, bf), delta = max - min;
        if (delta === 0) return 0;
        let hue = 0;
        if (max === rf) hue = ((gf - bf) / delta) % 6;
        else if (max === gf) hue = (bf - rf) / delta + 2;
        else hue = (rf - gf) / delta + 4;
        hue = Math.round(hue * 60);
        if (hue < 0) hue += 360;
        return hue;
    }
    function applyCardPalettes() {
        const isDark = currentTheme === 'dark';
        document.querySelectorAll('.ED-General-card').forEach(cardEl => {
            const cardId = cardEl.getAttribute('data-card-id');
            const card = allCards.find(c => c.id === cardId);
            if (!card) return;
            const palette = isDark ? (card.darkModePalette || {}) : (card.lightModePalette || {});
            const accent = palette.accent || '#4a7fd9';
            cardEl.style.setProperty('--card-accent', accent);
            if (palette.iconBg) cardEl.style.setProperty('--ED-General-card-icon-bg', palette.iconBg);
            else cardEl.style.removeProperty('--ED-General-card-icon-bg');
            const rgb = hexToRgb(accent);
            const lum = getLuminance(rgb.r, rgb.g, rgb.b);
            const hue = getHue(rgb.r, rgb.g, rgb.b);
            const baseOpacity = 0.06 + (1 - lum) * 0.12;
            const opacityHover = baseOpacity * 2.1;
            const darkMultiplier = isDark ? 1.45 : 1;
            const finalOpacity = Math.min(baseOpacity * darkMultiplier, 0.22);
            const finalOpacityHover = Math.min(opacityHover * darkMultiplier, 0.40);
            let offsetX = 0;
            if (hue >= 0 && hue <= 50) offsetX = 2;
            else if (hue > 50 && hue <= 100) offsetX = 1;
            else if (hue >= 200 && hue <= 280) offsetX = -2;
            else if (hue > 280 && hue <= 330) offsetX = -1;
            let blurBase = 10, blurHover = 30;
            if (hue >= 0 && hue <= 100) { blurBase = 12; blurHover = 34; }
            else if (hue >= 200 && hue <= 300) { blurBase = 8; blurHover = 26; }
            cardEl.style.setProperty('--card-accent-r', rgb.r);
            cardEl.style.setProperty('--card-accent-g', rgb.g);
            cardEl.style.setProperty('--card-accent-b', rgb.b);
            cardEl.style.setProperty('--card-shadow-opacity', finalOpacity.toFixed(3));
            cardEl.style.setProperty('--card-shadow-opacity-hover', finalOpacityHover.toFixed(3));
            cardEl.style.setProperty('--card-shadow-blur', blurBase + 'px');
            cardEl.style.setProperty('--card-shadow-blur-hover', blurHover + 'px');
            cardEl.style.setProperty('--card-shadow-offset-x', offsetX + 'px');
            cardEl.style.setProperty('--card-shadow-offset-y', '3px');
            cardEl.style.setProperty('--card-shadow-offset-y-hover', (6 + Math.abs(offsetX)) + 'px');
        });
    }
    function renderCardGrid(cards, targetId, categoryClass) {
        const grid = document.getElementById(targetId);
        if (!grid) return;
        const lang = currentLang;
        grid.innerHTML = '';
        cards.forEach(card => {
            const cardLang = card[lang] || card['en'] || {};
            const cardName = cardLang.name || card.id;
            const cardDesc = cardLang.description || uiText[lang].noDescription;
            const firstLetter = cardName.charAt(0).toUpperCase();
            let iconHTML = '';
            if (card.imageIcon && card.imageIcon.trim() !== '') {
                iconHTML = `<img src="${escapeHTML(card.imageIcon)}" alt="${escapeHTML(uiText[lang].imageIconAlt)}" onerror="this.setAttribute('data-error','1');this.nextElementSibling.style.display='flex';" loading="lazy"><span class="ED-General-card__icon-letter">${escapeHTML(firstLetter)}</span>`;
            } else {
                iconHTML = `<span class="ED-General-card__icon-letter" style="display:flex;">${escapeHTML(firstLetter)}</span>`;
            }
            let insideLinksHTML = '';
            if (card.insideLinks && card.insideLinks.length > 0) {
                insideLinksHTML = '<div class="ED-General-card__inside-links">' +
                    card.insideLinks.map(il => {
                        const linkLang = il[lang] || il['en'] || {};
                        const linkName = linkLang.name || 'Link';
                        return `<a href="${escapeHTML(il.url)}" class="ED-General-inside-link" target="_blank" rel="noopener noreferrer" title="${escapeHTML(linkName)}">${escapeHTML(linkName)}<span class="ED-General-inside-link__arrow">↗</span></a>`;
                    }).join('') + '</div>';
            }
            grid.insertAdjacentHTML('beforeend', `
                <div class="ED-General-card ${categoryClass}" data-card-id="${escapeHTML(card.id)}">
                    <div class="ED-General-card__icon-container">${iconHTML}</div>
                    <h3 class="ED-General-card__name">${escapeHTML(cardName)}</h3>
                    <p class="ED-General-card__description">${escapeHTML(cardDesc)}</p>
                    ${insideLinksHTML}
                    <a href="${escapeHTML(card.link)}" class="ED-General-card__main-btn" target="_blank" rel="noopener noreferrer">${uiText[lang].visitBtn}<span class="ED-General-card__main-btn-arrow">→</span></a>
                </div>
            `);
        });
    }
    function applyTheme() {
        document.documentElement.setAttribute('data-theme', currentTheme);
        localStorage.setItem('dashboardTheme', currentTheme);
        applyCardPalettes();
    }
    function toggleTheme() {
        currentTheme = currentTheme === 'light' ? 'dark' : 'light';
        applyTheme();
    }
    function updateInstallButtonText() {
        const installBtn = document.getElementById('installBtn');
        if (installBtn) installBtn.textContent = getNestedValue(uiText[currentLang], 'installBtn') || '📲 Install App';
    }
    function updateConnectionStatus() {
        const dot = document.getElementById('status-dot');
        const label = document.getElementById('connection-status-label');
        const statusSpan = document.getElementById('connection-status');
        if (!dot || !statusSpan) return;
        const online = navigator.onLine;
        dot.className = 'status-dot' + (online ? '' : ' offline');
        if (label) {
            label.textContent = online
                ? getNestedValue(uiText[currentLang], 'onlineStatus') || 'Online'
                : getNestedValue(uiText[currentLang], 'offlineStatus') || 'Offline';
        }
        statusSpan.title = online
            ? (getNestedValue(uiText[currentLang], 'onlineStatus') || 'Online')
            : (getNestedValue(uiText[currentLang], 'offlineStatus') || 'Offline');
    }
    function setupConnectionIndicator() {
        const statusSpan = document.getElementById('connection-status');
        if (!statusSpan) return;
        window.addEventListener('online', updateConnectionStatus);
        window.addEventListener('offline', updateConnectionStatus);
        updateConnectionStatus();
    }
    function setupOfflineBanner() {
        const banner = document.getElementById('offline-banner');
        if (!banner) return;
        window.addEventListener('offline', () => banner.style.display = 'block');
        window.addEventListener('online', () => banner.style.display = 'none');
        if (!navigator.onLine) banner.style.display = 'block';
    }
    function setLanguage(lang) {
        if (lang === currentLang) return;
        currentLang = lang;
        localStorage.setItem('dashboardLang', lang);
        translatePage();
        updateInstallButtonText();
        updateConnectionStatus();
        renderAll();
    }
    function renderAll() {
        for (const [category, config] of Object.entries(categoryConfig)) {
            renderCardGrid(allCards.filter(c => c.category === category), config.gridId, config.cssClass);
        }
        applyCardPalettes();
    }
    function escapeHTML(str) {
        if (typeof str !== 'string') return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    // PWA install
    let deferredPrompt;
    const installBtn = document.getElementById('installBtn');
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        if (installBtn) {
            installBtn.style.display = 'inline-flex';
            updateInstallButtonText();
        }
    });
    if (installBtn) {
        installBtn.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            console.log('Install outcome:', outcome);
            deferredPrompt = null;
            installBtn.style.display = 'none';
        });
    }
    window.addEventListener('appinstalled', () => {
        deferredPrompt = null;
        if (installBtn) installBtn.style.display = 'none';
    });

    // Convert base64 VAPID public key to Uint8Array
    function urlBase64ToUint8Array(base64String) {
        const padding = '='.repeat((4 - base64String.length % 4) % 4);
        const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
        const rawData = window.atob(base64);
        const outputArray = new Uint8Array(rawData.length);
        for (let i = 0; i < rawData.length; ++i) {
            outputArray[i] = rawData.charCodeAt(i);
        }
        return outputArray;
    }

    // Ask for permission and subscribe
    async function subscribeToPush() {
        if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
            console.warn('Push not supported');
            return;
        }
        const permission = await Notification.requestPermission();
        if (permission !== 'granted') {
            console.warn('Notification permission denied');
            return;
        }
        const registration = await navigator.serviceWorker.ready;
        const existingSubscription = await registration.pushManager.getSubscription();
        if (existingSubscription) {
            await saveSubscription(existingSubscription);
            return;
        }
        const subscription = await registration.pushManager.subscribe({
            userVisibleOnly: true,
            applicationServerKey: urlBase64ToUint8Array('BO2xV3C8PcVFX-2SqsAyHZgzyDBaC0N7GzDktpoX2J5Pj5Cz9IazAcybQqxe13xYqGnEpoVmXM2jHFqmjXko1kw')
        });
        await saveSubscription(subscription);
        console.log('Push subscription saved');
    }

    // --- NEW: UI helper for the notification button ---
    async function updateNotificationUI() {
        const btn = document.getElementById('enableNotifications');
        if (!btn) return;
        if ('Notification' in window) {
            if (Notification.permission === 'default') {
                btn.style.display = 'inline-block';   // show button so user can click
            } else {
                btn.style.display = 'none';           // already granted or denied – hide it
                // If already granted, subscribe automatically
                if (Notification.permission === 'granted') {
                    await subscribeToPush();
                }
            }
        } else {
            btn.style.display = 'none';
        }
    }

    // ========== Init ==========
    function init() {
        currentTheme = localStorage.getItem('dashboardTheme') || 'light';
        applyTheme();
        currentLang = localStorage.getItem('dashboardLang') || 'en';
        translatePage();
        setupConnectionIndicator();
        setupOfflineBanner();
        updateInstallButtonText();
        renderAll();

        // Service Worker registration
        if ('serviceWorker' in navigator) {
            function registerServiceWorker() {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => {
                        console.log('SW registered:', reg.scope);
                        if ('SyncManager' in window) {
                            reg.sync.register('sync-data').catch(() => {});
                        }
                    })
                    .catch(err => console.error('SW registration failed:', err));
            }
            if (document.readyState === 'complete') {
                registerServiceWorker();
            } else {
                window.addEventListener('load', registerServiceWorker);
            }
        }

        // Notification button click handler (button is in footer, already loaded)
        const notifBtn = document.getElementById('enableNotifications');
        if (notifBtn) {
            notifBtn.addEventListener('click', async () => {
                await subscribeToPush();
                updateNotificationUI();
            });
        }

        // Show or hide the button (and auto‑subscribe if already allowed)
        updateNotificationUI();

        // Periodic Sync Toggle Button
        const periodicBtn = document.getElementById('enablePeriodicSync');
        if (periodicBtn && 'serviceWorker' in navigator && 'periodicSync' in ServiceWorkerRegistration.prototype) {
            periodicBtn.style.display = 'inline-block';
            let isSyncActive = false;
            async function checkRegistrationState() {
                try {
                    const reg = await navigator.serviceWorker.ready;
                    if ('periodicSync' in reg) {
                        const tags = await reg.periodicSync.getTags();
                        isSyncActive = tags.includes('periodic-update');
                    }
                } catch (e) {
                    isSyncActive = localStorage.getItem('periodicSyncActive') === 'true';
                }
                updatePeriodicSyncButton();
            }
            checkRegistrationState();
            function updatePeriodicSyncButton() {
                const key = isSyncActive ? 'disablePeriodicSyncBtn' : 'enablePeriodicSyncBtn';
                periodicBtn.textContent = getNestedValue(uiText[currentLang], key);
                localStorage.setItem('periodicSyncActive', isSyncActive);
            }
            window.updatePeriodicSyncButton = updatePeriodicSyncButton;
            periodicBtn.addEventListener('click', async () => {
                const reg = await navigator.serviceWorker.ready;
                if (!('periodicSync' in reg)) return;
                if (isSyncActive) {
                    try {
                        await reg.periodicSync.unregister('periodic-update');
                        isSyncActive = false;
                        updatePeriodicSyncButton();
                        alert(getNestedValue(uiText[currentLang], 'periodicSyncDisabled') || 'Background updates disabled.');
                    } catch (err) {
                        console.error('Unregister failed:', err);
                        alert('Could not disable background updates.');
                    }
                } else {
                    try {
                        const status = await navigator.permissions.query({ name: 'periodic-background-sync' });
                        if (status.state !== 'granted') {
                            alert(getNestedValue(uiText[currentLang], 'periodicSyncDenied'));
                            return;
                        }
                        await reg.periodicSync.register('periodic-update', { minInterval: 6 * 60 * 60 * 1000 });
                        isSyncActive = true;
                        updatePeriodicSyncButton();
                        alert(getNestedValue(uiText[currentLang], 'periodicSyncEnabled') || 'Background updates enabled!');
                    } catch (err) {
                        console.error('Register failed:', err);
                        alert(getNestedValue(uiText[currentLang], 'periodicSyncDenied'));
                    }
                }
            });
        }

        // Listen for NEW_VERSION_READY message from SW (existing update banner)
        if (navigator.serviceWorker) {
            navigator.serviceWorker.addEventListener('message', event => {
                if (event.data && event.data.type === 'NEW_VERSION_READY') {
                    const banner = document.getElementById('update-banner');
                    if (banner) {
                        banner.style.display = 'flex';
                    }
                }
            });
        }

        document.getElementById('update-reload-btn').addEventListener('click', () => {
            window.location.reload();
        });

        // Theme & language toggles
        const themeToggle = document.getElementById('themeToggle');
        if (themeToggle) themeToggle.addEventListener('click', toggleTheme);
        const langSelect = document.getElementById('langSelect');
        if (langSelect) langSelect.addEventListener('change', function() { setLanguage(this.value); });
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.shiftKey && e.key === 'T') {
                e.preventDefault();
                toggleTheme();
            }
        });
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();
