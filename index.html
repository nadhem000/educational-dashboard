<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Educational Dashboard</title>
		<link rel="icon" type="image/x-icon" href="assets/icons/icon-64x64.png">
		<link rel="manifest" href="/manifest.json" />
		<link rel="stylesheet" href="/ED-general-common.css">
		<style>
			:root {
			--ED-General-color-bg: #f5f1eb;
			--ED-General-color-bg-secondary: #ede7df;
			--ED-General-color-surface: #ffffff;
			--ED-General-color-surface-hover: #fafaf8;
			--ED-General-color-text-primary: #1e293b;
			--ED-General-color-text-secondary: #5a6c7d;
			--ED-General-color-text-tertiary: #8b9aab;
			--ED-General-color-border: #e2dcd4;
			--ED-General-color-border-hover: #cbc3b8;
			--ED-General-color-shadow: rgba(60, 50, 40, 0.07);
			--ED-General-color-shadow-hover: rgba(60, 50, 40, 0.14);
			--ED-General-color-accent-default: #4a7fd9;
			--ED-General-color-accent-light: #e8f1fb;
			--ED-General-color-accent-soft: #f0f5fc;
			--ED-General-color-header-bg: #ffffff;
			--ED-General-color-header-border: #e8e2d9;
			--ED-General-color-toggle-bg: #e8e2d9;
			--ED-General-color-toggle-text: #4a5568;
			--ED-General-color-toggle-active-bg: #4a7fd9;
			--ED-General-color-toggle-active-text: #ffffff;
			--ED-General-color-badge-bg: #f0ece5;
			--ED-General-color-badge-text: #5a6c7d;
			--ED-General-color-badge-hover-bg: #e4ded5;
			--ED-General-color-btn-primary-bg: #4a7fd9;
			--ED-General-color-btn-primary-text: #ffffff;
			--ED-General-color-btn-primary-hover: #3b6ec4;
			--ED-General-color-btn-shadow: rgba(0, 0, 0, 0.2);
			--ED-General-color-icon-container-bg: #f0f4f9;
			--ED-General-card-radius: 16px;
			--ED-General-card-padding: 1.5rem;
			--ED-General-transition-speed: 0.3s;
			--ED-General-grid-gap: 1.25rem;
			--ED-General-font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial,
			"Noto Sans", "Noto Sans Arabic", sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
			--card-accent-r: 60;
			--card-accent-g: 50;
			--card-accent-b: 40;
			--card-shadow-opacity: 0.10;
			--card-shadow-opacity-hover: 0.22;
			--card-shadow-blur: 10px;
			--card-shadow-blur-hover: 30px;
			--card-shadow-offset-x: 0px;
			--card-shadow-offset-y: 3px;
			--card-shadow-offset-y-hover: 8px;
			--ED-General-color-header-gradient-start: #fefdfb;
			--ED-General-color-header-gradient-mid1: #faf8f4;
			--ED-General-color-header-gradient-mid2: #f6f3ee;
			--ED-General-color-header-gradient-end: #f2efe8;
			--ED-General-color-header-accent-gradient-stop: rgba(180, 160, 140, 0.5);
			--ED-General-color-shadow-rgb: 60, 50, 40;
			--ED-General-color-accent-rgb: 74, 127, 217;
			--ED-General-color-icon-sun: #e8a840;
			--ED-General-color-icon-moon: #7b8cb0;
			--ED-General-color-icon-sun-glow: rgba(232, 168, 64, 0.3);
			--ED-General-color-icon-moon-glow: rgba(122, 143, 176, 0.35);
			--ED-General-color-text-on-accent: #ffffff;
			}
			
			[data-theme="dark"] {
			--ED-General-color-bg: #171a20;
			--ED-General-color-bg-secondary: #1e2129;
			--ED-General-color-surface: #23262f;
			--ED-General-color-surface-hover: #2a2e38;
			--ED-General-color-text-primary: #e2e4ea;
			--ED-General-color-text-secondary: #b0b5c2;
			--ED-General-color-text-tertiary: #7d8494;
			--ED-General-color-border: #32353e;
			--ED-General-color-border-hover: #454952;
			--ED-General-color-shadow: rgba(0, 0, 0, 0.25);
			--ED-General-color-shadow-hover: rgba(0, 0, 0, 0.45);
			--ED-General-color-accent-default: #7aafff;
			--ED-General-color-accent-light: #1e2d45;
			--ED-General-color-accent-soft: #1a2535;
			--ED-General-color-header-bg: #1c1f28;
			--ED-General-color-header-border: #2a2e38;
			--ED-General-color-toggle-bg: #2a2e38;
			--ED-General-color-toggle-text: #b0b5c2;
			--ED-General-color-toggle-active-bg: #7aafff;
			--ED-General-color-toggle-active-text: #12151c;
			--ED-General-color-badge-bg: #2a2e38;
			--ED-General-color-badge-text: #b0b5c2;
			--ED-General-color-badge-hover-bg: #353a45;
			--ED-General-color-btn-primary-bg: #7aafff;
			--ED-General-color-btn-primary-text: #12151c;
			--ED-General-color-btn-primary-hover: #6199f0;
			--ED-General-color-btn-shadow: rgba(0, 0, 0, 0.5);
			--ED-General-color-icon-container-bg: #252b38;
			--ED-General-color-header-gradient-start: #1f222d;
			--ED-General-color-header-gradient-mid1: #1c1f29;
			--ED-General-color-header-gradient-mid2: #191c24;
			--ED-General-color-header-gradient-end: #171a20;
			--ED-General-color-header-accent-gradient-stop: rgba(160, 175, 200, 0.4);
			--ED-General-color-shadow-rgb: 0, 0, 0;
			--ED-General-color-accent-rgb: 122, 175, 255;
			--ED-General-color-icon-sun: #e8a840;
			--ED-General-color-icon-moon: #c4d0f0;
			--ED-General-color-icon-sun-glow: rgba(232, 168, 64, 0.3);
			--ED-General-color-icon-moon-glow: rgba(180, 195, 235, 0.35);
			--ED-General-color-text-on-accent: #12151c;
			}
			
			[dir="rtl"] {
			direction: rtl;
			text-align: right;
			}
			
			[dir="rtl"] .ED-General-card__inside-links {
			justify-content: flex-end;
			}
			
			[dir="rtl"] .ED-General-card__main-btn .ED-General-card__main-btn-arrow {
			transform: scaleX(-1);
			}
			
			[dir="rtl"] .ED-General-card__main-btn:hover .ED-General-card__main-btn-arrow {
			transform: scaleX(-1) translateX(-3px);
			}
			
			[dir="rtl"] .ED-General-inside-link__arrow {
			transform: scaleX(-1);
			}
			
			.ED-General-main {
			max-width: 1300px;
			margin: 0 auto;
			padding: 1.75rem 1.5rem 3rem;
			}
			
			.ED-General-main__subtitle {
			font-size: 0.9rem;
			color: var(--ED-General-color-text-tertiary);
			margin-bottom: 1.5rem;
			transition: color var(--ED-General-transition-speed) ease;
			letter-spacing: 0.02em;
			}
			
			.ED-General-card-grid {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
			gap: var(--ED-General-grid-gap);
			}
			
			.ED-General-card {
			background: var(--ED-General-color-surface);
			border: 1px solid var(--ED-General-color-border);
			border-radius: var(--ED-General-card-radius);
			padding: var(--ED-General-card-padding);
			display: flex;
			flex-direction: column;
			gap: 0.85rem;
			transition: all var(--ED-General-transition-speed) ease;
			box-shadow: 0 var(--card-shadow-offset-y, 3px) var(--card-shadow-blur, 10px)
			rgba(var(--card-accent-r, 60), var(--card-accent-g, 50), var(--card-accent-b, 40), var(--card-shadow-opacity, 0.10)),
			0 1px 4px rgba(var(--card-accent-r, 60), var(--card-accent-g, 50), var(--card-accent-b, 40), calc(var(--card-shadow-opacity, 0.10) * 0.55));
			position: relative;
			overflow: hidden;
			cursor: default;
			--card-accent: var(--ED-General-color-accent-default);
			}
			
			.ED-General-card::before {
			content: '';
			position: absolute;
			top: 0; left: 0; right: 0;
			height: 3px;
			background: var(--card-accent);
			border-radius: 0 0 3px 3px;
			opacity: 0;
			transition: opacity 0.3s ease;
			}
			
			.ED-General-card:hover {
			border-color: var(--card-accent);
			box-shadow: 0 var(--card-shadow-offset-y-hover, 8px) var(--card-shadow-blur-hover, 30px)
			rgba(var(--card-accent-r, 60), var(--card-accent-g, 50), var(--card-accent-b, 40), var(--card-shadow-opacity-hover, 0.22)),
			0 2px 8px rgba(var(--card-accent-r, 60), var(--card-accent-g, 50), var(--card-accent-b, 40), calc(var(--card-shadow-opacity-hover, 0.22) * 0.45));
			transform: translateY(-3px);
			background: var(--ED-General-color-surface-hover);
			}
			
			.ED-General-card:hover::before { opacity: 1; }
			
			.ED-General-card__icon-container {
			width: 52px; height: 52px;
			border-radius: 14px;
			display: flex;
			align-items: center;
			justify-content: center;
			background: var(--ED-General-card-icon-bg, var(--ED-General-color-icon-container-bg));
			flex-shrink: 0;
			transition: background 0.3s ease, transform 0.3s ease;
			overflow: hidden;
			}
			
			.ED-General-card:hover .ED-General-card__icon-container { transform: scale(1.05); }
			
			.ED-General-card__icon-container img {
			width: 38px; height: 38px;
			object-fit: contain;
			border-radius: 6px;
			}
			
			.ED-General-card__icon-letter {
			font-size: 1.6rem;
			font-weight: 700;
			color: var(--card-accent);
			text-transform: uppercase;
			line-height: 1;
			display: none;
			align-items: center;
			justify-content: center;
			width: 100%; height: 100%;
			}
			
			.ED-General-card__icon-container img[data-error] { display: none; }
			.ED-General-card__icon-container img[data-error] + .ED-General-card__icon-letter { display: flex; }
			
			.ED-General-card__name {
			font-size: 1.1rem;
			font-weight: 700;
			letter-spacing: -0.01em;
			color: var(--ED-General-color-text-primary);
			}
			
			.ED-General-card__description {
			font-size: 0.875rem;
			color: var(--ED-General-color-text-secondary);
			line-height: 1.55;
			flex-grow: 1;
			}
			
			.ED-General-card__inside-links {
			display: flex;
			flex-wrap: wrap;
			gap: 0.4rem;
			margin-top: 0.1rem;
			}
			
			.ED-General-inside-link {
			display: inline-flex;
			align-items: center;
			gap: 0.25rem;
			padding: 0.3rem 0.65rem;
			border-radius: 14px;
			font-size: 0.75rem;
			font-weight: 500;
			text-decoration: none;
			background: var(--ED-General-color-badge-bg);
			color: var(--ED-General-color-badge-text);
			transition: all 0.2s ease;
			white-space: nowrap;
			font-family: var(--ED-General-font-stack);
			}
			
			.ED-General-inside-link:hover {
			background: var(--card-accent);
			color: var(--ED-General-color-text-on-accent);
			}
			
			.ED-General-inside-link__arrow {
			font-size: 0.7rem;
			opacity: 0.7;
			transition: transform 0.2s ease;
			}
			
			.ED-General-inside-link:hover .ED-General-inside-link__arrow {
			opacity: 1;
			transform: translateX(2px);
			}
			
			.ED-General-card__main-btn {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			gap: 0.4rem;
			padding: 0.55rem 1.1rem;
			border-radius: 22px;
			font-size: 0.85rem;
			font-weight: 600;
			text-decoration: none;
			border: none;
			background: var(--card-accent);
			color: var(--ED-General-color-text-on-accent);
			transition: all 0.25s ease;
			font-family: var(--ED-General-font-stack);
			align-self: flex-start;
			margin-top: 0.2rem;
			}
			
			.ED-General-card__main-btn:hover {
			filter: brightness(0.9);
			box-shadow: 0 4px 14px var(--ED-General-color-btn-shadow);
			transform: translateY(-1px);
			}
			
			.ED-General-card__main-btn-arrow {
			display: inline-block;
			font-size: 1rem;
			font-weight: 700;
			transition: transform 0.25s ease;
			line-height: 1;
			}
			
			.ED-General-card__main-btn:hover .ED-General-card__main-btn-arrow {
			transform: translateX(3px);
			}
			
			.ED-General-card--education { border-radius: var(--ED-General-card-radius); }
			.ED-General-card--others    { border-radius: 12px 20px 12px 20px; }
			.ED-General-card--games     { border-radius: 20px 5px 20px 5px; }
			.ED-General-card--news      { border-radius: 4px 20px 4px 20px; }
			.ED-General-card--obsolete  { border-radius: 8px 22px 8px 22px; opacity: 0.85; filter: grayscale(0.2); }
			
			.ED-General-section-title {
			font-size: 1.25rem;
			font-weight: 650;
			margin: 2rem 0 1rem;
			padding-bottom: 0.35rem;
			border-bottom: 1px solid var(--ED-General-color-border);
			color: var(--ED-General-color-text-primary);
			transition: color var(--ED-General-transition-speed) ease,
			border-color var(--ED-General-transition-speed) ease;
			}
			
			/* ---------- Responsive (only card‑related parts remain) ---------- */
			@media (max-width: 640px) {
			.ED-General-card-grid {
			grid-template-columns: 1fr;
			gap: 1rem;
			}
			.ED-General-main {
			padding: 1rem 0.75rem 2rem;
			}
			.ED-General-card {
			padding: 1.15rem;
			}
			.ED-General-card__icon-container {
			width: 42px; height: 42px;
			border-radius: 12px;
			}
			.ED-General-card__name {
			font-size: 1rem;
			}
			}
			
			@media (min-width: 641px) and (max-width: 1024px) {
			.ED-General-card-grid {
			grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
			}
			}
		</style>
	</head>
	<body>
		<header id="header-container"></header>
		<main class="ED-General-main">
			<p class="ED-General-main__subtitle" data-i18n="subtitle">Your learning hubs</p>
			<div class="ED-General-card-grid" id="cardGrid"></div>
			<h2 class="ED-General-section-title" data-i18n="othersTitle">Others</h2>
			<div class="ED-General-card-grid" id="othersGrid"></div>
			<h2 class="ED-General-section-title" data-i18n="gamesTitle">Games</h2>
			<div class="ED-General-card-grid" id="gamesGrid"></div>
			<h2 class="ED-General-section-title" data-i18n="newsTitle">News</h2>
			<div class="ED-General-card-grid" id="newsGrid"></div>
			<h2 class="ED-General-section-title" data-i18n="obsoleteTitle">Obsolete & unused</h2>
			<div class="ED-General-card-grid" id="obsoleteGrid"></div>
		</main>
		<footer id="footer-container"></footer>
		<!-- Offline banner -->
		<div id="offline-banner" class="ED-General-offline-banner" data-i18n="offlineBanner">You are offline. Some features may be unavailable.</div>
		<div id="update-banner" class="ED-General-update-banner" style="display:none;">
			<span id="update-banner-text" data-i18n="updateNotification">A new version is available.</span>
			<button id="update-reload-btn" data-i18n="updateReloadBtn">Reload</button>
		</div>

if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
</script> -->
		<!-- External data file -->
		<!-- Load shared translation data (common header/footer/banners) -->
		<script src="ED-general-translations-data.js"></script>
		<script src="data_general.js"></script>
		<script src="ED-general-cards.js"></script>
		<script src="ED-general-shortcuts.js"></script>
		<script src="ED-general-pwa.js"></script>
		
		<!-- ========== TRANSLATION DICTIONARY ========== -->
		<script>
			const PAGE_UI_TEXT = {
				en: {
					subtitle: 'Your learning hubs',
					othersTitle: 'Others',
					gamesTitle: 'Games',
					newsTitle: 'News',
					obsoleteTitle: 'Obsolete & unused',
					visitBtn: 'Visit',
					noDescription: 'No description available.',
					imageIconAlt: 'icon'
				},

				ar: {

			};
		</script>
		
		<!-- Translation engine and shared init -->
		<script src="ED-general-translation.js"></script>
<script src="ED-general-analytics.js"></script>
		<script src="ED-general-init.js"></script>
<script src="ED-general-auth.js"></script>

	</body>
