<div id="ED-General-auth-modal" class="ED-General-auth-modal-backdrop">
  <div class="ED-General-auth-modal-box">
    <h3 class="ED-General-auth-modal-title" id="ED-General-auth-modal-title" data-i18n="auth.signIn">Sign in</h3>

    <form id="ED-General-auth-form">
      <input
        id="ED-General-auth-email"
        type="email"
        data-i18n-placeholder="auth.emailPlaceholder"
        placeholder="Email"
        required
        class="ED-General-auth-modal-input"
      />

      <!-- Password row: two separate divs for input and eye -->
      <div style="display: flex; gap: 0.5rem; align-items: center; margin: 0.8rem 0;">
        <div style="flex: 1;">
          <input
            id="ED-General-auth-password"
            type="password"
            autocomplete="current-password"
            data-i18n-placeholder="auth.passwordPlaceholder"
            placeholder="Password"
            required
            class="ED-General-auth-modal-input"
          />
        </div>
        <div>
          <button type="button" class="ED-General-password-eye"
                  onclick="var p=document.getElementById('ED-General-auth-password');p.type=p.type==='password'?'text':'password';this.textContent=p.type==='password'?'👁️':'🙈';"
                  title="Show password">👁️</button>
        </div>
      </div>

      <div class="ED-General-auth-modal-actions">
        <button type="button" id="ED-General-auth-cancel-btn" class="ED-General-header-btn ED-General-auth-btn-cancel" data-i18n="auth.cancel">Cancel</button>
        <button type="submit" class="ED-General-header-btn ED-General-auth-btn-primary" data-i18n="auth.continue">Continue</button>
      </div>
    </form>

    <p class="ED-General-auth-modal-switch">
      <a href="#" id="ED-General-auth-toggle-mode" data-i18n="auth.switchToSignUp">Create an account</a>
    </p>

    <p class="ED-General-auth-modal-switch">
      <a href="#" id="ED-General-auth-forgot-password" data-i18n="auth.forgotPassword">Forgot password?</a>
    </p>

    <p id="ED-General-auth-error" class="ED-General-auth-error-msg"></p>
  </div>
</div>
